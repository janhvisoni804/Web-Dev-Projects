<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Speedometer Gradients -->
    <linearGradient id="gauge-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glow-green" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-panel" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg-grad)" />

  <!-- Abstract Grid Pattern -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <path d="M 0,75 L 800,75 M 0,150 L 800,150 M 0,225 L 800,225 M 0,300 L 800,300 M 0,375 L 800,375 M 0,450 L 800,450 M 0,525 L 800,525" />
    <path d="M 100,0 L 100,600 M 200,0 L 200,600 M 300,0 L 300,600 M 400,0 L 400,600 M 500,0 L 500,600 M 600,0 L 600,600 M 700,0 L 700,600" />
  </g>

  <!-- Background Glowing Aura -->
  <circle cx="400" cy="250" r="160" fill="#10b981" opacity="0.08" filter="url(#glow-green)" />

  <!-- Speedometer / Gauge -->
  <g transform="translate(400, 260)">
    <!-- Base track -->
    <path d="M -130,50 A 140,140 0 1,1 130,50" fill="none" stroke="#1f2937" stroke-width="20" stroke-linecap="round" />
    
    <!-- Colored track -->
    <path d="M -130,50 A 140,140 0 1,1 70,-115" fill="none" stroke="url(#gauge-grad)" stroke-width="20" stroke-linecap="round" filter="url(#glow-green)" />
    
    <!-- Dial Needle -->
    <path d="M 0,10 L 0,-130" stroke="#f3f4f6" stroke-width="6" stroke-linecap="round" transform="rotate(50)" />
    <circle cx="0" cy="0" r="18" fill="#1f2937" stroke="#ffffff" stroke-width="4" />
    
    <!-- Big Score Label -->
    <text x="0" y="70" font-family="'Outfit', sans-serif" font-size="60" font-weight="900" fill="#10b981" text-anchor="middle" filter="url(#glow-green)">92</text>
    <text x="0" y="100" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="2">PERFORMANCE</text>
  </g>

  <!-- Left Stats Block -->
  <g transform="translate(80, 150)">
    <rect width="180" height="90" rx="12" fill="#1e293b" opacity="0.8" stroke="#334155" stroke-width="1.5" />
    <text x="25" y="35" font-family="'Outfit', sans-serif" font-size="12" font-weight="700" fill="#94a3b8">LCP (Speed)</text>
    <text x="25" y="65" font-family="'Space Grotesk', sans-serif" font-size="24" font-weight="900" fill="#10b981">1.2s</text>
    <rect x="135" y="22" width="22" height="22" rx="4" fill="#10b981" opacity="0.2" />
    <text x="146" y="37" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="900" fill="#10b981" text-anchor="middle">✓</text>
  </g>

  <!-- Right Stats Block -->
  <g transform="translate(540, 150)">
    <rect width="180" height="90" rx="12" fill="#1e293b" opacity="0.8" stroke="#334155" stroke-width="1.5" />
    <text x="25" y="35" font-family="'Outfit', sans-serif" font-size="12" font-weight="700" fill="#94a3b8">FID (Delay)</text>
    <text x="25" y="65" font-family="'Space Grotesk', sans-serif" font-size="24" font-weight="900" fill="#10b981">48ms</text>
    <rect x="135" y="22" width="22" height="22" rx="4" fill="#10b981" opacity="0.2" />
    <text x="146" y="37" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="900" fill="#10b981" text-anchor="middle">✓</text>
  </g>

  <!-- Title Bottom -->
  <text x="400" y="490" font-family="'Outfit', sans-serif" font-size="30" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1">
    FRONTEND PERFORMANCE
  </text>
  <text x="400" y="525" font-family="'Outfit', sans-serif" font-size="18" font-weight="700" fill="#10b981" text-anchor="middle" letter-spacing="4">
    ANALYZER
  </text>
</svg>
