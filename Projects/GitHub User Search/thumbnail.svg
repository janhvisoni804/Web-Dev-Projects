<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.8" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#06b6d4" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Grid decoration -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <path d="M 0,50 L 400,50 M 0,100 L 400,100 M 0,150 L 400,150 M 0,200 L 400,200 M 0,250 L 400,250" />
    <path d="M 50,0 L 50,300 M 100,0 L 100,300 M 150,0 L 150,300 M 200,0 L 200,300 M 250,0 L 250,300 M 300,0 L 300,300 M 350,0 L 350,300" />
  </g>

  <!-- Glowing background elements -->
  <circle cx="80" cy="80" r="100" fill="#06b6d4" opacity="0.05" filter="url(#glow)" />
  <circle cx="320" cy="220" r="80" fill="#3b82f6" opacity="0.04" filter="url(#glow)" />

  <!-- Mockup Main card (Center-Right) -->
  <rect x="180" y="40" width="190" height="220" rx="12" fill="url(#cardGrad)" stroke="#1e293b" stroke-width="1.5" filter="url(#glow)" />
  
  <!-- Profile info mockups -->
  <circle cx="275" cy="85" r="24" fill="#334155" />
  <!-- Github logo symbol inside avatar -->
  <path d="M 275,69 C 266,69 259,76 259,85 C 259,92 264,98 271,100 C 272,100 272,100 272,100 C 272,100 272,99 272,99 L 272,96 C 267,97 266,95 265,92 C 264,91 263,89 262,88 C 261,88 261,88 262,88 C 263,88 264,89 264,91 C 265,93 267,94 269,94 C 269,94 270,94 270,94 C 270,92 271,91 272,90 C 268,90 264,88 264,82 C 264,80 265,78 266,77 C 266,76 265,74 266,72 C 266,72 268,73 271,75 C 272,74 274,74 275,74 C 276,74 278,74 279,75 C 282,73 284,72 284,72 C 285,74 284,76 284,77 C 285,78 286,80 286,82 C 286,88 282,90 278,90 C 279,91 279,93 279,95 L 279,99 C 279,99 279,100 280,100 C 286,98 291,92 291,85 C 291,76 284,69 275,69 Z" fill="#475569" />

  <rect x="220" y="125" width="110" height="6" rx="3" fill="#ffffff" opacity="0.8" />
  <rect x="240" y="137" width="70" height="4" rx="2" fill="#06b6d4" />

  <!-- Repo list items -->
  <rect x="195" y="160" width="160" height="24" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1" />
  <rect x="205" y="169" width="50" height="6" rx="3" fill="#475569" />
  <circle cx="340" cy="172" r="3" fill="#3b82f6" />

  <rect x="195" y="190" width="160" height="24" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1" />
  <rect x="205" y="199" width="70" height="6" rx="3" fill="#475569" />
  <circle cx="340" cy="202" r="3" fill="#06b6d4" />

  <rect x="195" y="220" width="160" height="24" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1" />
  <rect x="205" y="229" width="40" height="6" rx="3" fill="#475569" />
  <circle cx="340" cy="232" r="3" fill="#f59e0b" />

  <!-- Search input bar Mockup (Left) -->
  <rect x="30" y="90" width="130" height="120" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.5" />
  <rect x="42" y="105" width="50" height="5" rx="2.5" fill="#475569" />
  
  <rect x="42" y="120" width="106" height="24" rx="6" fill="#1e293b" stroke="#06b6d4" stroke-width="1" />
  <!-- Search Icon inside bar -->
  <circle cx="52" cy="132" r="3" fill="none" stroke="#06b6d4" stroke-width="1" />
  <line x1="54.5" y1="134.5" x2="58" y2="138" stroke="#06b6d4" stroke-width="1" />
  <rect x="64" y="129" width="40" height="6" rx="3" fill="#06b6d4" />

  <rect x="42" y="160" width="106" height="32" rx="6" fill="url(#accentGrad)" />
  <rect x="75" y="173" width="40" height="6" rx="3" fill="#ffffff" />
</svg>
