<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#120c24"/>
      <stop offset="100%" stop-color="#05030a"/>
    </linearGradient>
    
    <!-- Hole Inner Shadow Gradient -->
    <linearGradient id="holeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#030206"/>
      <stop offset="100%" stop-color="#1f143a"/>
    </linearGradient>

    <!-- Neon Pink Glow -->
    <filter id="neonPink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Neon Cyan Glow -->
    <filter id="neonCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="200" fill="url(#bgGrad)" />

  <!-- Grid lines (retro vibe) -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="160" x2="320" y2="160"/>
    <line x1="0" y1="130" x2="320" y2="130"/>
    <line x1="80" y1="100" x2="40" y2="200"/>
    <line x1="160" y1="100" x2="160" y2="200"/>
    <line x1="240" y1="100" x2="280" y2="200"/>
  </g>

  <!-- Mole Hole -->
  <ellipse cx="160" cy="165" rx="50" ry="18" fill="url(#holeGrad)" stroke="#ff007f" stroke-width="2.5" filter="url(#neonPink)" />

  <!-- Mole -->
  <g transform="translate(160, 155)">
    <!-- Body -->
    <path d="M -26 0 A 26 28 0 0 1 26 0 L 26 10 L -26 10 Z" fill="#8d5b30" />
    
    <!-- Snout / Face Area -->
    <ellipse cx="0" cy="-2" rx="14" ry="10" fill="#f5d3b3" />
    
    <!-- Eyes (Retro Crossed hit eyes) -->
    <g stroke="#2c1a0c" stroke-width="2.5" stroke-linecap="round" fill="none">
      <!-- Left Eye X -->
      <line x1="-10" y1="-12" x2="-6" y2="-8" />
      <line x1="-6" y1="-12" x2="-10" y2="-8" />
      <!-- Right Eye X -->
      <line x1="6" y1="-12" x2="10" y2="-8" />
      <line x1="10" y1="-12" x2="6" y2="-8" />
    </g>

    <!-- Pink Nose -->
    <polygon points="-3,-2 3,-2 0,2" fill="#ff9eb5" stroke="#f594a8" stroke-width="0.5" />
    
    <!-- Cute Teeth -->
    <rect x="-2" y="2" width="4" height="4" fill="#ffffff" rx="1" />

    <!-- Rosy Cheeks -->
    <circle cx="-10" cy="-3" r="3" fill="#ff7b7b" opacity="0.6" />
    <circle cx="10" cy="-3" r="3" fill="#ff7b7b" opacity="0.6" />
  </g>

  <!-- Whack Hammer Mallet (Retro Synthwave Style) -->
  <g transform="translate(205, 115) rotate(-30)">
    <!-- Handle -->
    <rect x="-4" y="10" width="8" height="50" rx="3" fill="#00f0ff" stroke="#00b8d4" stroke-width="1" filter="url(#neonCyan)"/>
    <!-- Head -->
    <rect x="-25" y="-12" width="50" height="24" rx="6" fill="#ff007f" stroke="#ffffff" stroke-width="1.5" filter="url(#neonPink)"/>
    <!-- Neon Highlights on mallet -->
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Sparks and Sparks (Glow) -->
  <g fill="none" stroke="#00f0ff" stroke-width="2" stroke-linecap="round" filter="url(#neonCyan)">
    <line x1="120" y1="120" x2="110" y2="115"/>
    <line x1="130" y1="100" x2="125" y2="90"/>
    <line x1="195" y1="105" x2="205" y2="98"/>
  </g>
  <g fill="none" stroke="#ff007f" stroke-width="2" stroke-linecap="round" filter="url(#neonPink)">
    <line x1="160" y1="100" x2="160" y2="85"/>
    <circle cx="115" cy="98" r="1.5" fill="#00f0ff" />
    <circle cx="185" cy="90" r="1.5" fill="#ff007f" />
  </g>

  <!-- Text Badge -->
  <rect x="10" y="10" width="88" height="20" rx="4" fill="#00f0ff" fill-opacity="0.1" stroke="#00f0ff" stroke-width="1" filter="url(#neonCyan)"/>
  <text x="54" y="24" font-family="-apple-system,SF Pro Display,Inter,sans-serif" font-weight="900" font-size="10" fill="#00f0ff" letter-spacing="1" text-anchor="middle">ARCADE</text>
</svg>
