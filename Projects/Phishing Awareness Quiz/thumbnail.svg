  <rect x="162" y="172" width="152" height="22" rx="5" fill="rgba(255,255,255,0.02)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
  <text x="238" y="187" font-family="system-ui,sans-serif" font-size="7" font-weight="600" fill="#ef4444" text-anchor="middle">Phishing Threat</text>
