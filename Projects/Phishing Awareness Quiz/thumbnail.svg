  <text x="18" y="104" font-family="system-ui,sans-serif" font-size="6" fill="#94a3b8">Dear Valued Customer,</text>
  <text x="18" y="114" font-family="system-ui,sans-serif" font-size="6" fill="#94a3b8">We detected unusual activity on your account.</text>
  <text x="18" y="124" font-family="system-ui,sans-serif" font-size="6" fill="#94a3b8">Verify: https://netflix-login.verify-now.ru/update</text>
  <!-- hover preview -->
  <rect x="12" y="132" width="296" height="14" rx="3" fill="rgba(0,0,0,0.25)" stroke="rgba(0,240,255,0.08)" stroke-width="0.5"/>
  <text x="18" y="143" font-family="monospace" font-size="6" fill="#ef4444">https://netflix-login.verify-now.ru/update</text>
  <!-- action buttons -->
  <rect x="6" y="172" width="152" height="22" rx="5" fill="rgba(255,255,255,0.02)" stroke="rgba(16,185,129,0.15)" stroke-width="1"/>
