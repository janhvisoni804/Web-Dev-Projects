        <text x="48" y="55" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#f59e0b">MEDIUM PRIORITY</text>
        <text x="334" y="55" font-family="monospace" font-size="9" font-weight="600" fill="#475569" text-anchor="end">⏳ June 12</text>
      </g>

      <g transform="translate(0, 198)" opacity="0.35">
        <rect width="348" height="54" rx="10" fill="#1f2937" />
        
        <rect x="14" y="16" width="12" height="12" rx="3" fill="#10b981"/>
        <path d="M 17 22 L 19 24 L 23 19" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
        
        <text x="36" y="26" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#94a3b8" text-decoration="line-through">Map SVG Workspace Coordinates Layer</text>
        <text x="36" y="40" font-family="-apple-system, sans-serif" font-size="9" fill="#475569">Compile technical wireframes vector boundaries shapes.</text>
      </g>
