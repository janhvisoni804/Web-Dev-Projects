        <line x1="4" y1="20" x2="4" y2="50" stroke="rgba(148, 163, 184, 0.1)" stroke-width="1"/>
        <text x="16" y="14" font-family="monospace" font-size="9" font-weight="700" fill="#10b981">11:24:05</text>
        <text x="16" y="26" font-family="-apple-system, sans-serif" font-size="10" font-weight="600" fill="#f8fafc">Task State Ingested</text>
        <text x="16" y="38" font-family="-apple-system, sans-serif" font-size="9" fill="#94a3b8">ID: #middleware-engine</text>
      </g>

      <g transform="translate(0, 80)">
        <circle cx="4" cy="14" r="3" fill="#3b82f6"/>
        <line x1="4" y1="20" x2="4" y2="50" stroke="rgba(148, 163, 184, 0.1)" stroke-width="1"/>
        <text x="16" y="14" font-family="monospace" font-size="9" font-weight="700" fill="#3b82f6">11:02:18</text>
        <text x="16" y="26" font-family="-apple-system, sans-serif" font-size="10" font-weight="600" fill="#f8fafc">Database Cache Flushed</text>
      </g>
      
      <g transform="translate(0, 134)">
        <circle cx="4" cy="14" r="3" fill="#ef4444"/>
        <text x="16" y="14" font-family="monospace" font-size="9" font-weight="700" fill="#ef4444">10:45:12</text>
        <text x="16" y="26" font-family="-apple-system, sans-serif" font-size="10" font-weight="600" fill="#94a3b8">Task Purged Row #4</text>
