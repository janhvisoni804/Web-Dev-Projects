        <text x="10" y="21" font-family="-apple-system, sans-serif" font-size="10" font-weight="600" fill="#94a3b8">Completed</text>
        <text x="110" y="22" font-family="monospace" font-size="12" font-weight="700" fill="#10b981" text-anchor="end">04</text>
      </g>
    </g>

    <line x1="152" y1="46" x2="152" y2="380" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>

