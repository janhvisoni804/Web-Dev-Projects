        <line x1="0" y1="0" x2="0" y2="64" stroke="#ef4444" stroke-width="3.5"/>
        
        <rect x="14" y="16" width="12" height="12" rx="3" fill="#111827" stroke="rgba(148, 163, 184, 0.2)" stroke-width="1"/>
        
        <text x="36" y="26" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#f8fafc">Refactor Central Ingestion Middleware Engine</text>
        <text x="36" y="40" font-family="-apple-system, sans-serif" font-size="9" fill="#94a3b8">Secure critical edge boundaries from parameter vector drops.</text>
        
        <circle cx="40" cy="52" r="3" fill="#ef4444"/>
        <text x="48" y="55" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#ef4444">HIGH PRIORITY</text>
        <text x="334" y="55" font-family="monospace" font-size="9" font-weight="600" fill="#475569" text-anchor="end">⏳ June 08</text>
