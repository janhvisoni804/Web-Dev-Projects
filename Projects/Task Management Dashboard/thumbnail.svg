<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04060b" />
      <stop offset="50%" stop-color="#070a13" />
      <stop offset="100%" stop-color="#0f1424" />
    </linearGradient>

    <filter id="panelGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.80"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#3b82f6" flood-opacity="0.02"/>
    </filter>

    <filter id="accentGlowBlue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="zenithBrand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>

    <pattern id="techGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(148, 163, 184, 0.02)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#techGrid)" />
  
  <circle cx="120" cy="120" r="200" fill="#3b82f6" opacity="0.03" filter="blur(50px)" />
  <circle cx="680" cy="380" r="180" fill="#ef4444" opacity="0.02" filter="blur(45px)" />

  <g transform="translate(50, 45)" filter="url(#panelGlow)">
    <rect width="700" height="380" rx="16" fill="#111827" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1.5"/>
    
    <circle cx="24" cy="22" r="5" fill="#ef4444" opacity="0.8"/>
    <circle cx="40" cy="22" r="5" fill="#f59e0b" opacity="0.8"/>
    <circle cx="56" cy="22" r="5" fill="#10b981" opacity="0.8"/>

    <g transform="translate(610, 15)">
      <rect width="12" height="12" rx="3" fill="url(#zenithBrand)" filter="url(#accentGlowBlue)"/>
      <text x="18" y="10" font-family="-apple-system, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="-0.02em">Zenith</text>
    </g>

    <g transform="translate(16, 54)">
      <rect width="120" height="24" rx="6" fill="rgba(59, 130, 246, 0.1)" stroke="rgba(59, 130, 246, 0.2)" stroke-width="1"/>
      <text x="10" y="15" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#60a5fa">📋 All Tasks</text>
      
      <text x="10" y="44" font-family="-apple-system, sans-serif" font-size="10" font-weight="600" fill="#94a3b8">⏳ Pending</text>
      <text x="10" y="68" font-family="-apple-system, sans-serif" font-size="10" font-weight="600" fill="#94a3b8">✅ Completed</text>

      <line x1="0" y1="94" x2="120" y2="94" stroke="rgba(148, 163, 184, 0.06)" stroke-width="1"/>

      <text x="0" y="114" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="0.05em">LIVE STATISTICS</text>
      
      <g transform="translate(0, 126)">
        <rect width="120" height="34" rx="6" fill="#1f2937" opacity="0.6"/>
        <text x="10" y="21" font-family="-apple-system, sans-serif" font-size="10" font-weight="600" fill="#94a3b8">Total</text>
        <text x="110" y="22" font-family="monospace" font-size="12" font-weight="700" fill="#f8fafc" text-anchor="end">12</text>
