        <line x1="0" y1="0" x2="0" y2="64" stroke="#f59e0b" stroke-width="3.5"/>
        
        <rect x="14" y="16" width="12" height="12" rx="3" fill="#111827" stroke="rgba(148, 163, 184, 0.2)" stroke-width="1"/>
        
        <text x="36" y="26" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#f8fafc">Optimize LocalStorage Serializer Flush Rate</text>
        <text x="36" y="40" font-family="-apple-system, sans-serif" font-size="9" fill="#94a3b8">Debounce persistence execution frames to prevent disk bottlenecks.</text>
        
