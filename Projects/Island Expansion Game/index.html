<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Island Expansion Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-waves"></div>
  <div class="app">
    <header class="header">
      <h1>Island Expansion</h1>
      <p class="header-sub">Paint land &amp; sea to match the numbered islands</p>
    </header>

    <div class="toolbar">
      <div class="level-select">
        <label class="select-label">Level</label>
        <select id="levelSelect"></select>
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="checkBtn">
          <span>✓</span> Check Solution
        </button>
        <button class="btn btn-secondary" id="resetBtn">
          <span>↺</span> Reset
        </button>
      </div>
    </div>

    <div class="stats">
      <div class="stat stat-placed">
        <span class="stat-icon">■</span>
        <span class="stat-value" id="placedCount">0</span>
        <span class="stat-label">Placed</span>
      </div>
      <div class="stat stat-blank">
        <span class="stat-icon">□</span>
        <span class="stat-value" id="blankCount">0</span>
        <span class="stat-label">Blank</span>
      </div>
      <div class="stat stat-islands">
        <span class="stat-icon">🏝</span>
        <span class="stat-value" id="islandCount">0</span>
        <span class="stat-label">Islands</span>
      </div>
    </div>

    <div class="legend">
      <span class="legend-item legend-empty">
        <span class="legend-swatch"></span> Unassigned
      </span>
      <span class="legend-item legend-land">
        <span class="legend-swatch"></span> Land
      </span>
      <span class="legend-item legend-ocean">
        <span class="legend-swatch"></span> Ocean
      </span>
    </div>

    <div class="grid-wrapper">
      <div class="grid" id="grid"></div>
    </div>

    <div class="banner" id="banner"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
