<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <!-- Background with dark blue color -->
  <rect width="320" height="200" fill="#0f172a"/>
  
  <!-- Movie Card / Film Reel / Clapperboard Graphic -->
  <g transform="translate(40 25)">
    <!-- Movie Screen / Glass Card -->
    <rect width="240" height="150" rx="16" fill="#1e293b" stroke="#38bdf8" stroke-width="2" opacity="0.9"/>
    
    <!-- Search Bar mock-up on top -->
    <rect x="20" y="20" width="200" height="24" rx="12" fill="#0f172a" stroke="rgba(148, 163, 184, 0.2)" stroke-width="1.5"/>
    <circle cx="36" cy="32" r="5" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="40" y1="36" x2="45" y2="41" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="56" y="28" width="80" height="8" rx="4" fill="#64748b"/>
    
    <!-- Play button inside circle / Movie icon in center -->
    <circle cx="120" cy="90" r="30" fill="rgba(56, 189, 248, 0.1)" stroke="#38bdf8" stroke-width="2"/>
    <polygon points="114,78 134,90 114,102" fill="#f59e0b"/>
    
    <!-- Decorative Movie Strips on Left/Right -->
    <!-- Left strip holes -->
    <g fill="#0f172a" opacity="0.6">
      <rect x="8" y="55" width="8" height="8" rx="1"/>
      <rect x="8" y="70" width="8" height="8" rx="1"/>
      <rect x="8" y="85" width="8" height="8" rx="1"/>
      <rect x="8" y="100" width="8" height="8" rx="1"/>
      <rect x="8" y="115" width="8" height="8" rx="1"/>
    </g>
    <!-- Right strip holes -->
    <g fill="#0f172a" opacity="0.6">
      <rect x="224" y="55" width="8" height="8" rx="1"/>
      <rect x="224" y="70" width="8" height="8" rx="1"/>
      <rect x="224" y="85" width="8" height="8" rx="1"/>
      <rect x="224" y="100" width="8" height="8" rx="1"/>
      <rect x="224" y="115" width="8" height="8" rx="1"/>
    </g>
  </g>
</svg>
