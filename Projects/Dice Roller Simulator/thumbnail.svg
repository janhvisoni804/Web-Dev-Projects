<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0e17" />
      <stop offset="100%" stop-color="#232136" />
    </linearGradient>
    <linearGradient id="diceGradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="diceGradRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#b91c1c" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  
  <!-- Decorative Grid lines -->
  <path d="M 0,100 L 800,100 M 0,200 L 800,200 M 0,300 L 800,300 M 0,400 L 800,400 M 100,0 L 100,500 M 200,0 L 200,500 M 300,0 L 300,500 M 400,0 L 400,500 M 500,0 L 500,500 M 600,0 L 600,500 M 700,0 L 700,500" stroke="#ff7b00" stroke-opacity="0.05" stroke-width="1.5" />
  
  <!-- Dice Tray Border -->
  <rect x="50" y="50" width="700" height="400" rx="20" fill="none" stroke="#ea580c" stroke-opacity="0.2" stroke-width="2" />
  
  <!-- Decorative circles -->
  <circle cx="400" cy="250" r="180" fill="none" stroke="#ea580c" stroke-opacity="0.1" stroke-width="2" stroke-dasharray="10 15" />
  
  <!-- Dice 1 (Orange, Isometric style) -->
  <g transform="translate(300, 200)">
    <!-- Top Face -->
    <path d="M 0,-60 L 70,-20 L 0,20 L -70,-20 Z" fill="#ff9d5c" />
    <!-- Left Face -->
    <path d="M -70,-20 L 0,20 L 0,100 L -70,60 Z" fill="#ea580c" />
    <!-- Right Face -->
    <path d="M 0,20 L 70,-20 L 70,60 L 0,100 Z" fill="#c2410c" />
    
    <!-- Top Pip (Value 1) -->
    <circle cx="0" cy="0" r="8" fill="#ffffff" />
    
    <!-- Left Pips (Value 3) -->
    <circle cx="-35" cy="20" r="6" fill="#ffffff" fill-opacity="0.9" />
    <circle cx="-15" cy="40" r="6" fill="#ffffff" fill-opacity="0.9" />
    <circle cx="-55" cy="0" r="6" fill="#ffffff" fill-opacity="0.9" />
    
    <!-- Right Pips (Value 5) -->
    <circle cx="35" cy="20" r="6" fill="#ffffff" fill-opacity="0.9" />
    <circle cx="20" cy="40" r="6" fill="#ffffff" fill-opacity="0.9" />
    <circle cx="50" cy="0" r="6" fill="#ffffff" fill-opacity="0.9" />
    <circle cx="20" cy="0" r="6" fill="#ffffff" fill-opacity="0.9" />
    <circle cx="50" cy="40" r="6" fill="#ffffff" fill-opacity="0.9" />
  </g>
  
  <!-- Dice 2 (Red, Tilted) -->
  <g transform="translate(480, 280) rotate(-25)">
    <!-- Top Face -->
    <path d="M 0,-50 L 60,-17 L 0,17 L -60,-17 Z" fill="#ef4444" />
    <!-- Left Face -->
    <path d="M -60,-17 L 0,17 L 0,80 L -60,46 Z" fill="#dc2626" />
    <!-- Right Face -->
    <path d="M 0,17 L 60,-17 L 60,46 L 0,80 Z" fill="#991b1b" />
    
    <!-- Top Pips (Value 4) -->
    <circle cx="-20" cy="-7" r="5" fill="#ffffff" />
    <circle cx="20" cy="7" r="5" fill="#ffffff" />
    <circle cx="-20" cy="7" r="5" fill="#ffffff" />
    <circle cx="20" cy="-7" r="5" fill="#ffffff" />
    
    <!-- Left Pips (Value 2) -->
    <circle cx="-30" cy="15" r="5" fill="#ffffff" fill-opacity="0.9" />
    <circle cx="-30" cy="45" r="5" fill="#ffffff" fill-opacity="0.9" />
    
    <!-- Right Pips (Value 6) -->
    <circle cx="30" cy="15" r="5" fill="#ffffff" fill-opacity="0.9" />
    <circle cx="30" cy="45" r="5" fill="#ffffff" fill-opacity="0.9" />
    <circle cx="15" cy="30" r="5" fill="#ffffff" fill-opacity="0.9" />
    <circle cx="45" cy="30" r="5" fill="#ffffff" fill-opacity="0.9" />
    <circle cx="15" cy="0" r="5" fill="#ffffff" fill-opacity="0.9" />
    <circle cx="45" cy="60" r="5" fill="#ffffff" fill-opacity="0.9" />
  </g>
  
  <!-- App Title text overlay -->
  <text x="400" y="440" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="32" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="4" filter="url(#glow)">DICE ROLLER</text>
</svg>
