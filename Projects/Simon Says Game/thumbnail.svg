<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#03050a" />
      <stop offset="50%" stop-color="#070a13" />
      <stop offset="100%" stop-color="#0e1322" />
    </linearGradient>

    <filter id="panelGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.80"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#3b82f6" flood-opacity="0.02"/>
    </filter>

    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowRed" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="simonBrand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <pattern id="techGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(148, 163, 184, 0.02)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#techGrid)" />
  
  <circle cx="150" cy="150" r="220" fill="#a855f7" opacity="0.03" filter="blur(60px)" />
  <circle cx="650" cy="350" r="180" fill="#3b82f6" opacity="0.03" filter="blur(50px)" />

  <g transform="translate(50, 45)" filter="url(#panelGlow)">
    <rect width="700" height="380" rx="16" fill="#111827" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1.5"/>
    
    <circle cx="24" cy="22" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="40" cy="22" r="5" fill="#f59e0b" opacity="0.7"/>
    <circle cx="56" cy="22" r="5" fill="#10b981" opacity="0.7"/>

    <g transform="translate(595, 15)">
      <circle cx="6" cy="6" r="4" fill="url(#simonBrand)" />
      <text x="16" y="10" font-family="-apple-system, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.02em">SIMON // PRO</text>
    </g>

    <g transform="translate(24, 64)">
      <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="18" font-weight="800" fill="#ffffff" letter-spacing="-0.03em">Arcade Core</text>
      
      <rect y="28" width="144" height="26" rx="6" fill="rgba(16, 185, 129, 0.08)" stroke="rgba(16, 185, 129, 0.2)" stroke-width="1" />
      <text x="12" y="44" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#10b981">STATUS: YOUR TURN</text>

      <g transform="translate(0, 72)">
        <rect width="144" height="42" rx="8" fill="#1f2937" opacity="0.6"/>
        <text x="12" y="18" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="#94a3b8" letter-spacing="0.05em">CURRENT ROUND</text>
        <text x="12" y="34" font-family="monospace" font-size="14" font-weight="800" fill="#f8fafc">Round 08</text>
      </g>
      
      <g transform="translate(0, 124)">
        <rect width="144" height="42" rx="8" fill="#1f2937" opacity="0.6"/>
        <text x="12" y="18" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="#94a3b8" letter-spacing="0.05em">HIGH SCORE</text>
        <text x="12" y="34" font-family="monospace" font-size="14" font-weight="800" fill="#f59e0b">Score 24</text>
      </g>

      <rect y="196" width="144" height="36" rx="8" fill="#3b82f6" />
      <text x="72" y="218" font-family="-apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">Reset Simulation</text>
    </g>

    <line x1="196" y1="46" x2="196" y2="380" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>

    <g transform="translate(440, 210)">
      <circle cx="0" cy="0" r="124" fill="#070a13" stroke="rgba(148, 163, 184, 0.15)" stroke-width="4"/>
      
      <path d="M -8,-116 A 108,108 0 0,0 -108,-8 L -16,-8 A 16,16 0 0,1 -8,-16 Z" fill="#10b981" opacity="0.25"/>
      
      <g filter="url(#glowRed)">
        <path d="M 8,-116 A 108,108 0 0,1 108,-8 L 16,-8 A 16,16 0 0,0 8,-16 Z" fill="#ef4444" opacity="1"/>
        <path d="M 40,-85 L 50,-105" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      </g>

      <path d="M -108,8 A 108,108 0 0,0 -8,116 L -8,16 A 16,16 0 0,1 -16,8 Z" fill="#f59e0b" opacity="0.25"/>

      <path d="M 108,8 A 108,108 0 0,1 8,116 L 8,16 A 16,16 0 0,0 16,8 Z" fill="#3b82f6" opacity="0.25"/>

      <circle cx="0" cy="0" r="28" fill="#111827" stroke="rgba(148, 163, 184, 0.2)" stroke-width="2"/>
      <circle cx="0" cy="0" r="6" fill="#f8fafc" opacity="0.15"/>
    </g>
  </g>

  <g transform="translate(180, 440)">
    <rect width="440" height="42" rx="21" fill="rgba(4, 6, 11, 0.95)" stroke="rgba(148, 163, 184, 0.15)" stroke-width="1.5"/>
    
    <text x="28" y="26" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.06em">SIMON SAYS GAME</text>
    <circle cx="156" cy="22" r="2" fill="#475569" />
    
    <text x="172" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#38bdf8">HTML5</text>
    <text x="222" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#10b981">CSS3</text>
    <text x="268" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#f59e0b">ES6+</text>
    
    <rect x="318" y="13" width="94" height="16" rx="4" fill="rgba(168, 85, 247, 0.08)" stroke="rgba(168, 85, 247, 0.15)" stroke-width="1"/>
    <text x="324" y="24" font-family="-apple-system, sans-serif" font-size="8" font-weight="800" fill="#a855f7" letter-spacing="0.02em">WEB_AUDIO_API</text>
  </g>
</svg>
