<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <!-- Premium Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0a07" />
      <stop offset="100%" stop-color="#1c1912" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37" />
      <stop offset="50%" stop-color="#f3e5ab" />
      <stop offset="100%" stop-color="#aa7c11" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#24211a" />
      <stop offset="100%" stop-color="#14120e" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#d4af37" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Grid decoration -->
  <g stroke="#d4af37" stroke-opacity="0.04" stroke-width="1">
    <path d="M 0,50 L 400,50 M 0,100 L 400,100 M 0,150 L 400,150 M 0,200 L 400,200 M 0,250 L 400,250" />
    <path d="M 50,0 L 50,300 M 100,0 L 100,300 M 150,0 L 150,300 M 200,0 L 200,300 M 250,0 L 250,300 M 300,0 L 300,300 M 350,0 L 350,300" />
  </g>

  <!-- Decorative circles -->
  <circle cx="300" cy="80" r="100" fill="#d4af37" opacity="0.03" filter="url(#glow)" />

  <!-- Mock Dashboard Card (Center-Right) -->
  <rect x="180" y="50" width="190" height="200" rx="12" fill="url(#cardGrad)" stroke="#aa7c11" stroke-width="1.5" filter="url(#glow)" />
  
  <!-- Mini Header inside card -->
  <rect x="200" y="70" width="80" height="6" rx="3" fill="#6e6552" />
  <rect x="200" y="82" width="120" height="14" rx="4" fill="url(#goldGrad)" />
  <rect x="210" y="86" width="60" height="6" rx="2" fill="#000000" opacity="0.4" />

  <!-- Donut Chart representation -->
  <circle cx="275" cy="165" r="35" fill="none" stroke="#2a2720" stroke-width="14" />
  <circle cx="275" cy="165" r="35" fill="none" stroke="url(#goldGrad)" stroke-width="14" stroke-dasharray="140 220" stroke-dashoffset="0" />
  <circle cx="275" cy="165" r="35" fill="none" stroke="#a3822d" stroke-width="14" stroke-dasharray="60 220" stroke-dashoffset="-140" />

  <!-- Center balance -->
  <circle cx="275" cy="165" r="21" fill="#14120e" />

  <!-- Mock Left Panel Form Elements -->
  <rect x="30" y="60" width="130" height="180" rx="8" fill="#14120e" stroke="#24211a" stroke-width="1.5" />
  <rect x="42" y="75" width="60" height="5" rx="2.5" fill="#6e6552" />
  <rect x="42" y="86" width="106" height="18" rx="4" fill="#1f1c16" stroke="#2a2720" stroke-width="1" />
  
  <rect x="42" y="115" width="60" height="5" rx="2.5" fill="#6e6552" />
  <rect x="42" y="126" width="106" height="18" rx="4" fill="#1f1c16" stroke="#2a2720" stroke-width="1" />

  <rect x="42" y="155" width="60" height="5" rx="2.5" fill="#6e6552" />
  <rect x="42" y="166" width="106" height="18" rx="4" fill="#1f1c16" stroke="#2a2720" stroke-width="1" />

  <rect x="42" y="200" width="106" height="24" rx="6" fill="url(#goldGrad)" />
  <rect x="75" y="209" width="40" height="6" rx="3" fill="#0b0a07" />
</svg>
