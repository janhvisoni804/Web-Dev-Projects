<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030307" />
      <stop offset="50%" stop-color="#0a0a12" />
      <stop offset="100%" stop-color="#121224" />
    </linearGradient>

    <filter id="panelGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.90"/>
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#00f0ff" flood-opacity="0.04"/>
    </filter>

    <filter id="playerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="aiGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="cyberBrand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>

    <pattern id="arcadeGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(0, 240, 255, 0.025)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#arcadeGrid)" />
  
  <circle cx="700" cy="400" r="150" fill="#ff007f" opacity="0.02" filter="blur(50px)" />
  <circle cx="100" cy="100" r="200" fill="#00f0ff" opacity="0.02" filter="blur(60px)" />

  <g transform="translate(50, 45)" filter="url(#panelGlow)">
    <rect width="700" height="380" rx="12" fill="#06060c" stroke="rgba(0, 240, 255, 0.1)" stroke-width="1.5"/>
    
    <circle cx="24" cy="22" r="5" fill="#ff007f" opacity="0.7"/>
    <circle cx="40" cy="22" r="5" fill="#f59e0b" opacity="0.7"/>
    <circle cx="56" cy="22" r="5" fill="#00f0ff" opacity="0.7"/>

    <g transform="translate(555, 15)">
      <circle cx="5" cy="6" r="4" fill="url(#cyberBrand)" />
      <text x="14" y="10" font-family="monospace" font-size="11" font-weight="900" fill="#f8fafc" letter-spacing="0.06em">CYBER_GRID_v1.0</text>
    </g>

    <g transform="translate(20, 64)">
      <text x="0" y="14" font-family="monospace" font-size="13" font-weight="900" fill="#ffffff" letter-spacing="0.04em">SYSTEM_HUD</text>
      
      <rect y="24" width="126" height="24" rx="4" fill="rgba(0, 240, 255, 0.05)" stroke="rgba(0, 240, 255, 0.15)" stroke-width="1"/>
      <text x="12" y="39" font-family="monospace" font-size="9" font-weight="900" fill="#00f0ff" letter-spacing="0.02em">● RUNNING</text>

      <g transform="translate(0, 64)">
        <rect width="126" height="42" rx="6" fill="#121224" opacity="0.6" stroke="rgba(0, 240, 255, 0.05)" stroke-width="1"/>
        <text x="10" y="16" font-family="monospace" font-size="8" font-weight="800" fill="#00f0ff" letter-spacing="0.05em">USER SCORE</text>
        <text x="10" y="34" font-family="monospace" font-size="15" font-weight="900" fill="#f8fafc">04</text>
      </g>

      <g transform="translate(0, 118)">
        <rect width="126" height="42" rx="6" fill="#121224" opacity="0.6" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
        <text x="10" y="16" font-family="monospace" font-size="8" font-weight="800" fill="#ff007f" letter-spacing="0.05em">CORE_AI SCORE</text>
        <text x="10" y="34" font-family="monospace" font-size="15" font-weight="900" fill="#f8fafc">02</text>
      </g>

      <g transform="translate(0, 174)">
        <rect width="126" height="44" rx="6" fill="rgba(248, 250, 252, 0.02)" stroke="rgba(148, 163, 184, 0.06)" stroke-width="1"/>
        <text x="10" y="16" font-family="monospace" font-size="7" font-weight="800" fill="#64748b" letter-spacing="0.05em">INPUT INTERFACE</text>
        <text x="10" y="32" font-family="monospace" font-size="9" font-weight="900" fill="#94a3b8">WASD / ARROWS</text>
      </g>
    </g>

    <line x1="162" y1="46" x2="162" y2="380" stroke="rgba(0, 240, 255, 0.08)" stroke-width="1"/>

    <g transform="translate(182, 52)">
      <rect width="496" height="304" rx="8" fill="#020205" stroke="rgba(255, 0, 127, 0.08)" stroke-width="1.5"/>

      <line x1="0" y1="76" x2="496" y2="76" stroke="rgba(0, 240, 255, 0.015)" stroke-width="1"/>
      <line x1="0" y1="152" x2="496" y2="152" stroke="rgba(0, 240, 255, 0.015)" stroke-width="1"/>
      <line x1="0" y1="228" x2="496" y2="228" stroke="rgba(0, 240, 255, 0.015)" stroke-width="1"/>
      <line x1="124" y1="0" x2="124" y2="304" stroke="rgba(0, 240, 255, 0.015)" stroke-width="1"/>
      <line x1="248" y1="0" x2="248" y2="304" stroke="rgba(0, 240, 255, 0.015)" stroke-width="1"/>
      <line x1="372" y1="0" x2="372" y2="304" stroke="rgba(0, 240, 255, 0.015)" stroke-width="1"/>

      <g filter="url(#playerGlow)">
        <path d="M 60 240 L 180 240 L 180 100 L 320 100 L 320 180" fill="none" stroke="#00f0ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="320" cy="180" r="4" fill="#ffffff" stroke="#00f0ff" stroke-width="1.5"/>
      </g>

      <g filter="url(#aiGlow)">
        <path d="M 436 64 L 380 64 L 380 220 L 220 220 L 220 140" fill="none" stroke="#ff007f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="220" cy="140" r="4" fill="#ffffff" stroke="#ff007f" stroke-width="1.5"/>
      </g>

      <line x1="220" y1="140" x2="220" y2="90" stroke="rgba(255, 0, 127, 0.4)" stroke-width="1" stroke-dasharray="2 2"/>
    </g>
  </g>

  <g transform="translate(180, 440)">
    <rect width="440" height="42" rx="21" fill="rgba(3, 3, 7, 0.95)" stroke="rgba(0, 240, 255, 0.15)" stroke-width="1.5"/>
    
    <text x="28" y="26" font-family="monospace" font-size="11" font-weight="900" fill="#f8fafc" letter-spacing="0.06em">2D_CANVAS VECTOR ENGINE</text>
    <circle cx="184" cy="22" r="2" fill="#475569" />
    
    <text x="200" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#38bdf8">HTML5</text>
    <text x="250" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#10b981">CSS3</text>
    <text x="296" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#f59e0b">ES6+</text>
    
    <rect x="344" y="13" width="72" height="16" rx="4" fill="rgba(0, 240, 255, 0.08)" stroke="rgba(0, 240, 255, 0.15)" stroke-width="1"/>
    <text x="350" y="24" font-family="monospace" font-size="8" font-weight="900" fill="#00f0ff" letter-spacing="0.02em">RAF_LOOP</text>
  </g>
</svg>
