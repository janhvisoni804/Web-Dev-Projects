<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04060b" />
      <stop offset="50%" stop-color="#070a13" />
      <stop offset="100%" stop-color="#0e1322" />
    </linearGradient>

    <filter id="panelGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.80"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#3b82f6" flood-opacity="0.02"/>
    </filter>

    <linearGradient id="stroopBrand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <linearGradient id="timerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <pattern id="uiGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(148, 163, 184, 0.02)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#uiGrid)" />
  
  <circle cx="680" cy="120" r="200" fill="#3b82f6" opacity="0.03" filter="blur(55px)" />
  <circle cx="150" cy="380" r="180" fill="#ef4444" opacity="0.02" filter="blur(50px)" />

  <g transform="translate(50, 45)" filter="url(#panelGlow)">
    <rect width="700" height="380" rx="16" fill="#111827" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1.5"/>
    
    <circle cx="24" cy="22" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="40" cy="22" r="5" fill="#f59e0b" opacity="0.7"/>
    <circle cx="56" cy="22" r="5" fill="#10b981" opacity="0.7"/>

    <g transform="translate(590, 15)">
      <circle cx="5" cy="6" r="4" fill="url(#stroopBrand)" />
      <text x="14" y="10" font-family="-apple-system, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.02em">STROOP // PRO</text>
    </g>

    <g transform="translate(20, 64)">
      <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="-0.02em">Cognitive Core</text>
      
      <g transform="translate(0, 28)">
        <rect width="126" height="42" rx="8" fill="#1f2937" opacity="0.5"/>
        <text x="10" y="16" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="0.05em">CURRENT STREAK</text>
        <text x="10" y="34" font-family="monospace" font-size="14" font-weight="800" fill="#10b981">24 Streak</text>
      </g>

      <g transform="translate(0, 82)">
        <rect width="126" height="42" rx="8" fill="#1f2937" opacity="0.5"/>
        <text x="10" y="16" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="0.05em">ALL-TIME BEST</text>
        <text x="10" y="34" font-family="monospace" font-size="14" font-weight="800" fill="#f59e0b">Max: 57</text>
      </g>

      <g transform="translate(0, 136)">
        <rect width="126" height="42" rx="8" fill="#1f2937" opacity="0.5"/>
        <text x="10" y="16" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="0.05em">ACCURACY RATE</text>
        <text x="10" y="34" font-family="monospace" font-size="14" font-weight="800" fill="#3b82f6">96.8% Sync</text>
      </g>

      <rect y="196" width="126" height="28" rx="6" fill="#1f2937" stroke="rgba(148, 163, 184, 0.1)" stroke-width="1"/>
      <text x="63" y="213" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="#f8fafc" text-anchor="middle">Reset Simulation</text>
    </g>

    <line x1="162" y1="46" x2="162" y2="380" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>

    <g transform="translate(178, 64)">
      
