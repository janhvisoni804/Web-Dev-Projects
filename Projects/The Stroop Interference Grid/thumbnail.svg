          <circle cx="16" cy="18" r="6" fill="#ef4444"/>
          <text x="28" y="21" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#94a3b8">RED</text>

          <rect x="103" y="0" width="90" height="36" rx="6" fill="#1f2937" stroke="rgba(148, 163, 184, 0.06)" stroke-width="1"/>
          <circle cx="119" cy="18" r="6" fill="#10b981"/>
          <text x="131" y="21" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#94a3b8">GREEN</text>

          <rect x="206" y="0" width="90" height="36" rx="6" fill="#1f2937" stroke="#f59e0b" stroke-width="1.5"/>
          <circle cx="222" cy="18" r="6" fill="#f59e0b"/>
          <text x="234" y="21" font-family="-apple-system, sans-serif" font-size="10" font-weight="800" fill="#f8fafc">YELLOW</text>

          <rect x="309" y="0" width="90" height="36" rx="6" fill="#1f2937" stroke="rgba(148, 163, 184, 0.06)" stroke-width="1"/>
          <circle cx="325" cy="18" r="6" fill="#3b82f6"/>
          <text x="337" y="21" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#94a3b8">BLUE</text>

          <rect x="412" y="0" width="90" height="36" rx="6" fill="#1f2937" stroke="rgba(148, 163, 184, 0.06)" stroke-width="1"/>
          <circle cx="428" cy="18" r="6" fill="#a855f7"/>
          <text x="440" y="21" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#94a3b8">PURPLE</text>
