  <g transform="translate(180, 440)">
    <rect width="440" height="42" rx="21" fill="rgba(4, 6, 11, 0.95)" stroke="rgba(148, 163, 184, 0.15)" stroke-width="1.5"/>
    
    <text x="28" y="26" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.06em">STROOP COGNITIVE MATRIX</text>
    <circle cx="184" cy="22" r="2" fill="#475569" />
    
    <text x="200" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#38bdf8">HTML5</text>
    <text x="250" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#10b981">CSS3</text>
    <text x="296" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#f59e0b">ES6+</text>
    
    <rect x="344" y="13" width="72" height="16" rx="4" fill="rgba(168, 85, 247, 0.08)" stroke="rgba(168, 85, 247, 0.15)" stroke-width="1"/>
    <text x="350" y="24" font-family="-apple-system, sans-serif" font-size="8" font-weight="800" fill="#a855f7" letter-spacing="0.02em">STROOP_EFF</text>
  </g>
</svg>
