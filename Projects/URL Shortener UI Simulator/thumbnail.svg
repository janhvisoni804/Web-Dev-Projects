<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d16"/>
      <stop offset="50%" stop-color="#111726"/>
      <stop offset="100%" stop-color="#02050b"/>
    </linearGradient>
    
    <!-- Accent Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="300" rx="20" fill="url(#bgGrad)"/>
  
  <!-- Grid Lines -->
  <path d="M 0,50 L 500,50 M 0,100 L 500,100 M 0,150 L 500,150 M 0,200 L 500,200 M 0,250 L 500,250" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <path d="M 50,0 L 50,300 M 100,0 L 100,300 M 150,0 L 150,300 M 200,0 L 200,300 M 250,0 L 250,300 M 300,0 L 300,300 M 350,0 L 350,300 M 400,0 L 400,300 M 450,0 L 450,300" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  
  <!-- Sidebar simulation -->
  <rect x="0" y="0" width="75" height="300" rx="20" fill="rgba(17, 23, 38, 0.45)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  
  <!-- Brand Logo link shape -->
  <g transform="translate(37, 40)">
    <circle cx="0" cy="0" r="12" fill="url(#primaryGrad)"/>
    <path d="M -5,-3 L 5,3 M -5,2 L -2,5 M 2,-5 L 5,-2" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Sidebar items mock -->
  <circle cx="37" cy="90" r="4" fill="#6366f1"/>
  <circle cx="37" cy="125" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="37" cy="160" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="37" cy="195" r="4" fill="rgba(255,255,255,0.2)"/>
  
  <!-- Header Title -->
  <text x="95" y="42" font-family="'Outfit', sans-serif" font-weight="800" font-size="20" fill="#ffffff">ShortLink Lab</text>
  <text x="95" y="58" font-family="'Inter', sans-serif" font-weight="500" font-size="10" fill="#94a3b8">Simulated hash redirection analytics</text>
  
  <!-- Stat Widget 1 (Clicks count) -->
  <rect x="360" y="20" width="120" height="40" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)"/>
  <text x="420" y="36" font-family="'Inter', sans-serif" font-weight="600" font-size="8" fill="#94a3b8" text-anchor="middle">TOTAL CLICKS</text>
  <text x="420" y="52" font-family="'Outfit', sans-serif" font-weight="800" font-size="14" fill="#06b6d4" text-anchor="middle">1,248 Clicks</text>
  
  <!-- Core Design: Interactive Link Input Dashboard Widget -->
  <g transform="translate(95, 80)">
    <!-- Main Card Body -->
    <rect width="250" height="195" rx="14" fill="rgba(30, 41, 59, 0.45)" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="20" y="28" font-family="'Outfit', sans-serif" font-weight="700" font-size="11" fill="#ffffff">Simplify Link</text>
    
    <!-- Input Box Simulation -->
    <rect x="20" y="42" width="210" height="28" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
    <text x="32" y="59" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8">https://github.com/MistryVishwa/Web-Dev-Projects</text>
    
    <!-- Cut Scissors animation overlay -->
    <circle cx="210" cy="56" r="8" fill="url(#primaryGrad)"/>
    <path d="M 207,56 L 213,56 M 209,53 L 211,59" stroke="#ffffff" stroke-width="1.5"/>
    
    <!-- Output Shortened Link simulation -->
    <rect x="20" y="85" width="210" height="40" rx="8" fill="rgba(99, 102, 241, 0.05)" stroke="rgba(99, 102, 241, 0.15)"/>
    <text x="30" y="102" font-family="'Inter', sans-serif" font-size="8" fill="#94a3b8">SHORT LINK</text>
    <text x="30" y="117" font-family="'Outfit', sans-serif" font-weight="700" font-size="12" fill="#06b6d4">shrt.lnk/nsoc26</text>
    
    <!-- Simulated Redirect modal trigger button preview -->
    <rect x="20" y="140" width="210" height="30" rx="6" fill="#6366f1"/>
    <text x="125" y="159" font-family="'Inter', sans-serif" font-weight="700" font-size="10" fill="#ffffff" text-anchor="middle">Test Redirect Simulation</text>
  </g>
  
  <!-- Right Dashboard Graph (Click logs timeline) -->
  <g transform="translate(365, 80)">
    <rect width="115" height="195" rx="14" fill="rgba(30, 41, 59, 0.45)" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
    <text x="15" y="25" font-family="'Outfit', sans-serif" font-weight="700" font-size="11" fill="#ffffff">Clicks / Link</text>
    
    <!-- Bar 1 -->
    <rect x="15" y="45" width="85" height="18" rx="4" fill="rgba(255,255,255,0.03)"/>
    <rect x="15" y="45" width="65" height="18" rx="4" fill="url(#primaryGrad)"/>
    <text x="22" y="57" font-family="'Inter', sans-serif" font-weight="700" font-size="8" fill="#ffffff">nsoc26</text>
    <text x="92" y="57" font-family="'Outfit', sans-serif" font-weight="700" font-size="8" fill="#ffffff" text-anchor="end">420</text>
    
    <!-- Bar 2 -->
    <rect x="15" y="70" width="85" height="18" rx="4" fill="rgba(255,255,255,0.03)"/>
    <rect x="15" y="70" width="45" height="18" rx="4" fill="url(#secondaryGrad)"/>
    <text x="22" y="82" font-family="'Inter', sans-serif" font-weight="700" font-size="8" fill="#ffffff">antigrav</text>
    <text x="92" y="82" font-family="'Outfit', sans-serif" font-weight="700" font-size="8" fill="#ffffff" text-anchor="end">210</text>
    
    <!-- Bar 3 -->
    <rect x="15" y="95" width="85" height="18" rx="4" fill="rgba(255,255,255,0.03)"/>
    <rect x="15" y="95" width="30" height="18" rx="4" fill="url(#successGrad)"/>
    <text x="22" y="107" font-family="'Inter', sans-serif" font-weight="700" font-size="8" fill="#ffffff">web-api</text>
    <text x="92" y="107" font-family="'Outfit', sans-serif" font-weight="700" font-size="8" fill="#ffffff" text-anchor="end">95</text>
    
    <!-- Simulated success toast badge -->
    <rect x="15" y="135" width="85" height="42" rx="8" fill="rgba(16, 185, 129, 0.08)" stroke="rgba(16,185,129,0.2)"/>
    <circle cx="28" cy="156" r="6" fill="#10b981"/>
    <path d="M 26,156 L 28,158 L 31,154" stroke="#ffffff" stroke-width="1.2" fill="none"/>
    <text x="38" y="159" font-family="'Inter', sans-serif" font-weight="700" font-size="8" fill="#10b981">Active</text>
  </g>
</svg>
