<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>

    <!-- UI Accent Gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Glass Fill -->
    <linearGradient id="glass-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.08)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.03)" />
    </linearGradient>

    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bg-grad)" />

  <!-- Abstract Ambient Glows -->
  <circle cx="200" cy="150" r="180" fill="#6366f1" opacity="0.15" filter="url(#blur)" />
  <circle cx="600" cy="350" r="220" fill="#ec4899" opacity="0.15" filter="url(#blur)" />

  <!-- Mock Notebook Graphic -->
  <g transform="translate(180, 80)">
    <!-- Binder Cover (Glassmorphic) -->
    <rect x="20" y="0" width="440" height="340" rx="20" fill="url(#glass-fill)" stroke="rgba(255,255,255,0.08)" stroke-width="2" filter="url(#blur)" />
    
    <!-- Spine binding rings -->
    <path d="M 10 30 L 30 30 M 10 70 L 30 70 M 10 110 L 30 110 M 10 150 L 30 150 M 10 190 L 30 190 M 10 230 L 30 230 M 10 270 L 30 270 M 10 310 L 30 310" stroke="rgba(255,255,255,0.2)" stroke-width="6" stroke-linecap="round" />
    <path d="M 8 30 L 22 30 M 8 70 L 22 70 M 8 110 L 22 110 M 8 150 L 22 150 M 8 190 L 22 190 M 8 230 L 22 230 M 8 270 L 22 270 M 8 310 L 22 310" stroke="url(#accent-grad)" stroke-width="3.5" stroke-linecap="round" />

    <!-- Notebook Pages Stack (visual lines) -->
    <rect x="50" y="20" width="390" height="300" rx="8" fill="rgba(15, 23, 42, 0.6)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1.5" />

    <!-- Notebook Content -->
    <text x="80" y="60" fill="#ffffff" font-family="'Outfit', sans-serif" font-weight="bold" font-size="18">🔒 Secure Vault Notes</text>
    <line x1="80" y1="80" x2="400" y2="80" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" />
    
    <!-- Mock write-ups -->
    <line x1="80" y1="110" x2="360" y2="110" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" />
    <line x1="80" y1="135" x2="320" y2="135" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" />
    <line x1="80" y1="160" x2="380" y2="160" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" />

    <!-- Checkboxes / Tags -->
    <rect x="80" y="195" width="16" height="16" rx="4" fill="url(#accent-grad)" />
    <path d="M 84 203 L 87 206 L 92 199" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <text x="106" y="208" fill="#a855f7" font-family="'Space Grotesk', sans-serif" font-weight="bold" font-size="12">Save Auto-sync</text>

    <rect x="230" y="195" width="16" height="16" rx="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
    <text x="256" y="208" fill="#9ca3af" font-family="'Space Grotesk', sans-serif" font-size="12">Encrypted Diary</text>

    <!-- Shield / Lock icon overlay -->
    <g transform="translate(320, 200)">
      <circle cx="35" cy="35" r="35" fill="rgba(15, 23, 42, 0.85)" stroke="url(#accent-grad)" stroke-width="1.5" />
      <!-- Shield Shape -->
      <path d="M 23 23 L 35 18 L 47 23 L 47 35 C 47 45 35 51 35 51 C 35 51 23 45 23 35 Z" fill="url(#accent-grad)" opacity="0.85" />
      <!-- Keyhole -->
      <circle cx="35" cy="31" r="3.5" fill="#ffffff" />
      <path d="M 35 34 L 35 41 L 33 41 L 37 41" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
    </g>
  </g>

  <!-- Title Text at Bottom -->
  <text x="400" y="460" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="24" font-weight="900" text-anchor="middle" letter-spacing="1">DIGITAL NOTEBOOK</text>
</svg>
