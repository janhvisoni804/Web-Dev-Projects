<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Background -->
  <rect width="400" height="300" fill="#03060f"/>
  
  <!-- Glowing grids/circles -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#03060f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="400" height="300" fill="url(#glow)"/>

  <!-- Grid lines -->
  <path d="M 0,50 L 400,50 M 0,100 L 400,100 M 0,150 L 400,150 M 0,200 L 400,200 M 0,250 L 400,250" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <path d="M 50,0 L 50,300 M 100,0 L 100,300 M 150,0 L 150,300 M 200,0 L 200,300 M 250,0 L 250,300 M 300,0 L 300,300 M 350,0 L 350,300" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- CPU Chip Body -->
  <rect x="110" y="70" width="180" height="150" rx="12" fill="url(#chipGrad)" stroke="#f59e0b" stroke-width="3" filter="drop-shadow(0 0 10px rgba(245, 158, 11, 0.3))"/>
  
  <!-- Chip Pins -->
  <!-- Left Pins -->
  <rect x="94" y="90" width="16" height="8" rx="2" fill="#94a3b8"/>
  <rect x="94" y="115" width="16" height="8" rx="2" fill="#94a3b8"/>
  <rect x="94" y="140" width="16" height="8" rx="2" fill="#94a3b8"/>
  <rect x="94" y="165" width="16" height="8" rx="2" fill="#94a3b8"/>
  <rect x="94" y="190" width="16" height="8" rx="2" fill="#94a3b8"/>

  <!-- Right Pins -->
  <rect x="290" y="90" width="16" height="8" rx="2" fill="#94a3b8"/>
  <rect x="290" y="115" width="16" height="8" rx="2" fill="#94a3b8"/>
  <rect x="290" y="140" width="16" height="8" rx="2" fill="#94a3b8"/>
  <rect x="290" y="165" width="16" height="8" rx="2" fill="#94a3b8"/>
  <rect x="290" y="190" width="16" height="8" rx="2" fill="#94a3b8"/>

  <!-- Circuit traces -->
  <path d="M 50,94 L 94,94 M 50,140 L 94,140 M 50,190 L 94,190" stroke="rgba(6, 182, 212, 0.4)" stroke-width="2" fill="none"/>
  <path d="M 350,94 L 290,94 M 350,140 L 290,140 M 350,190 L 290,190" stroke="rgba(16, 185, 129, 0.4)" stroke-width="2" fill="none"/>

  <!-- Chip details & labels -->
  <text x="200" y="115" fill="#f8fafc" font-family="'Outfit', sans-serif" font-size="16" font-weight="800" text-anchor="middle" letter-spacing="1">RETRO CPU</text>
  <text x="200" y="135" fill="#94a3b8" font-family="'Fira Code', monospace" font-size="11" text-anchor="middle">16-BIT VM</text>
  
  <!-- Register value displays inside chip -->
  <rect x="130" y="155" width="60" height="24" rx="4" fill="#020409" stroke="rgba(255,255,255,0.08)"/>
  <text x="160" y="171" fill="#f59e0b" font-family="'Fira Code', monospace" font-size="9" text-anchor="middle" font-weight="600">ACC:0F3A</text>

  <rect x="210" y="155" width="60" height="24" rx="4" fill="#020409" stroke="rgba(255,255,255,0.08)"/>
  <text x="240" y="171" fill="#06b6d4" font-family="'Fira Code', monospace" font-size="9" text-anchor="middle" font-weight="600">PC:00C5</text>
  
  <rect x="170" y="187" width="60" height="20" rx="4" fill="#020409" stroke="rgba(255,255,255,0.08)"/>
  <text x="200" y="200" fill="#10b981" font-family="'Fira Code', monospace" font-size="8" text-anchor="middle">SP:00FF</text>

  <!-- Glowing nodes on background -->
  <circle cx="50" cy="94" r="3" fill="#06b6d4" filter="drop-shadow(0 0 3px #06b6d4)"/>
  <circle cx="50" cy="140" r="3" fill="#06b6d4" filter="drop-shadow(0 0 3px #06b6d4)"/>
  <circle cx="50" cy="190" r="3" fill="#06b6d4" filter="drop-shadow(0 0 3px #06b6d4)"/>

  <circle cx="350" cy="94" r="3" fill="#10b981" filter="drop-shadow(0 0 3px #10b981)"/>
  <circle cx="350" cy="140" r="3" fill="#10b981" filter="drop-shadow(0 0 3px #10b981)"/>
  <circle cx="350" cy="190" r="3" fill="#10b981" filter="drop-shadow(0 0 3px #10b981)"/>

  <!-- Code / Binary text at bottom -->
  <text x="200" y="260" fill="rgba(245,158,11,0.4)" font-family="'Fira Code', monospace" font-size="10" text-anchor="middle" letter-spacing="3">PUSH 5 | ADD | JMP LOOP</text>
</svg>
