<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="320" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d0f14"/>
      <stop offset="100%" stop-color="#13161e"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="200" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="40" x2="320" y2="40"/>
    <line x1="0" y1="80" x2="320" y2="80"/>
    <line x1="0" y1="120" x2="320" y2="120"/>
    <line x1="0" y1="160" x2="320" y2="160"/>
    <line x1="64" y1="0" x2="64" y2="200"/>
    <line x1="128" y1="0" x2="128" y2="200"/>
    <line x1="192" y1="0" x2="192" y2="200"/>
    <line x1="256" y1="0" x2="256" y2="200"/>
  </g>

  <!-- Glow blob -->
  <ellipse cx="160" cy="100" rx="90" ry="60" fill="rgba(124,58,237,0.08)"/>

  <!-- Chat bubble — incoming (left) -->
  <rect x="28" y="52" width="130" height="36" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <!-- bubble tail -->
  <path d="M28 74 L18 82 L35 74Z" fill="rgba(255,255,255,0.06)"/>
  <!-- avatar dot -->
  <circle cx="20" cy="52" r="8" fill="url(#grad)"/>
  <text x="20" y="56" font-size="7" fill="white" text-anchor="middle" font-family="Inter,sans-serif" font-weight="700">A</text>
  <!-- message lines -->
  <rect x="40" y="63" width="70" height="5" rx="2.5" fill="rgba(255,255,255,0.25)"/>
  <rect x="40" y="73" width="50" height="5" rx="2.5" fill="rgba(255,255,255,0.15)"/>

  <!-- Chat bubble — outgoing (right) -->
  <rect x="162" y="52" width="130" height="36" rx="14" fill="url(#grad)" filter="url(#glow)" opacity="0.9"/>
  <!-- bubble tail -->
  <path d="M292 74 L302 82 L285 74Z" fill="url(#grad)" opacity="0.9"/>
  <!-- message lines -->
  <rect x="172" y="63" width="65" height="5" rx="2.5" fill="rgba(255,255,255,0.55)"/>
  <rect x="172" y="73" width="90" height="5" rx="2.5" fill="rgba(255,255,255,0.4)"/>

  <!-- Chat bubble — incoming 2 -->
  <rect x="28" y="104" width="148" height="36" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <path d="M28 126 L18 134 L35 126Z" fill="rgba(255,255,255,0.06)"/>
  <circle cx="20" cy="104" r="8" fill="#10b981"/>
  <text x="20" y="108" font-size="7" fill="white" text-anchor="middle" font-family="Inter,sans-serif" font-weight="700">B</text>
  <rect x="40" y="115" width="88" height="5" rx="2.5" fill="rgba(255,255,255,0.25)"/>
  <rect x="40" y="125" width="55" height="5" rx="2.5" fill="rgba(255,255,255,0.15)"/>

  <!-- Typing indicator -->
  <rect x="28" y="153" width="62" height="24" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <circle cx="46" cy="165" r="3.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="56" cy="165" r="3.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="66" cy="165" r="3.5" fill="rgba(255,255,255,0.4)"/>

  <!-- Live badge -->
  <rect x="230" y="156" width="62" height="20" rx="10" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.35)" stroke-width="1"/>
  <circle cx="243" cy="166" r="3.5" fill="#10b981"/>
  <text x="250" y="170" font-size="8" fill="#10b981" font-family="Inter,sans-serif" font-weight="600">2 online</text>

  <!-- Header bar -->
  <rect x="0" y="0" width="320" height="32" rx="12" fill="rgba(255,255,255,0.03)"/>
  <rect x="0" y="20" width="320" height="12" fill="rgba(255,255,255,0.03)"/>
  <rect x="12" y="10" width="8" height="12" rx="2" fill="url(#grad)" opacity="0.7"/>
  <text x="26" y="20" font-size="9" fill="rgba(255,255,255,0.7)" font-family="Inter,sans-serif" font-weight="700"># general</text>
  <text x="90" y="20" font-size="7.5" fill="rgba(255,255,255,0.25)" font-family="Inter,sans-serif">Real-time · BroadcastChannel</text>
</svg>
