<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0a07" />
      <stop offset="100%" stop-color="#1a1208" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b00" />
      <stop offset="100%" stop-color="#ff9e00" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22180e" />
      <stop offset="100%" stop-color="#140e08" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#ff6b00" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Grid decoration -->
  <g stroke="#ff6b00" stroke-opacity="0.03" stroke-width="1">
    <path d="M 0,50 L 400,50 M 0,100 L 400,100 M 0,150 L 400,150 M 0,200 L 400,200 M 0,250 L 400,250" />
    <path d="M 50,0 L 50,300 M 100,0 L 100,300 M 150,0 L 150,300 M 200,0 L 200,300 M 250,0 L 250,300 M 300,0 L 300,300 M 350,0 L 350,300" />
  </g>

  <!-- Glowing background elements -->
  <circle cx="80" cy="80" r="100" fill="#ff6b00" opacity="0.04" filter="url(#glow)" />
  <circle cx="320" cy="220" r="80" fill="#ff9e00" opacity="0.03" filter="url(#glow)" />

  <!-- Mockup Main card (Right) -->
  <rect x="180" y="40" width="190" height="220" rx="12" fill="url(#cardGrad)" stroke="#ff6b00" stroke-width="1.5" filter="url(#glow)" />
  
  <!-- Header elements inside card -->
  <rect x="200" y="60" width="60" height="6" rx="3" fill="#6e4f32" />
  <!-- Question mockup lines -->
  <rect x="200" y="80" width="150" height="8" rx="4" fill="#ffffff" opacity="0.8" />
  <rect x="200" y="94" width="100" height="8" rx="4" fill="#ffffff" opacity="0.8" />

  <!-- Options buttons mockup -->
  <rect x="200" y="120" width="150" height="20" rx="6" fill="#140e08" stroke="#3d2712" stroke-width="1" />
  <circle cx="212" cy="130" r="5" fill="#3d2712" />
  <rect x="226" y="127" width="80" height="6" rx="3" fill="#6e4f32" />

  <!-- Correct option highlight -->
  <rect x="200" y="150" width="150" height="20" rx="6" fill="rgba(255, 107, 0, 0.1)" stroke="#ff6b00" stroke-width="1.5" />
  <circle cx="212" cy="160" r="5" fill="#ff6b00" />
  <rect x="226" y="157" width="80" height="6" rx="3" fill="#ff6b00" />

  <rect x="200" y="180" width="150" height="20" rx="6" fill="#140e08" stroke="#3d2712" stroke-width="1" />
  <circle cx="212" cy="190" r="5" fill="#3d2712" />
  <rect x="226" y="187" width="80" height="6" rx="3" fill="#6e4f32" />

  <!-- Timer circle display -->
  <circle cx="275" cy="228" r="16" fill="none" stroke="#3d2712" stroke-width="3" />
  <circle cx="275" cy="228" r="16" fill="none" stroke="url(#orangeGrad)" stroke-width="3" stroke-dasharray="80 100" />
  <text x="275" y="232" fill="#ff6b00" font-family="system-ui, sans-serif" font-weight="bold" font-size="10" text-anchor="middle">12</text>

  <!-- Mock Left Panel Icons -->
  <rect x="30" y="50" width="130" height="200" rx="8" fill="#140e08" stroke="#22180e" stroke-width="1.5" />
  <!-- Profile details -->
  <circle cx="95" cy="85" r="20" fill="url(#orangeGrad)" />
  <rect x="55" y="120" width="80" height="6" rx="3" fill="#ffffff" opacity="0.8" />
  <rect x="65" y="132" width="60" height="5" rx="2.5" fill="#6e4f32" />

  <!-- Category items -->
  <rect x="45" y="160" width="100" height="20" rx="5" fill="#22180e" stroke="#3d2712" stroke-width="1" />
  <rect x="60" y="167" width="50" height="5" rx="2.5" fill="#ff6b00" />
  
  <rect x="45" y="190" width="100" height="20" rx="5" fill="#22180e" stroke="#3d2712" stroke-width="1" />
  <rect x="60" y="197" width="50" height="5" rx="2.5" fill="#6e4f32" />
</svg>
