  <rect width="320" height="200" fill="#f7f6f3"/>

  <!-- 5 color swatches -->
  <rect x="0"   y="0" width="64" height="148" fill="#e07b54"/>
  <rect x="64"  y="0" width="64" height="148" fill="#e8a87c"/>
  <rect x="128" y="0" width="64" height="148" fill="#5b8dee"/>
  <rect x="192" y="0" width="64" height="148" fill="#54c7a2"/>
  <rect x="256" y="0" width="64" height="148" fill="#9b72cf"/>

