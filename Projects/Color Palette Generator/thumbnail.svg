  <text x="96"  y="168" text-anchor="middle" font-family="-apple-system,Inter,sans-serif" font-size="9" fill="#7c7a74">#E8A87C</text>
  <text x="160" y="168" text-anchor="middle" font-family="-apple-system,Inter,sans-serif" font-size="9" fill="#7c7a74">#5B8DEE</text>
  <text x="224" y="168" text-anchor="middle" font-family="-apple-system,Inter,sans-serif" font-size="9" fill="#7c7a74">#54C7A2</text>
