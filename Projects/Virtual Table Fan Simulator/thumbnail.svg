<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04060b" />
      <stop offset="50%" stop-color="#070a13" />
      <stop offset="100%" stop-color="#0e1322" />
    </linearGradient>

    <filter id="panelGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.80"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#3b82f6" flood-opacity="0.02"/>
    </filter>

    <filter id="rotorGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="fanBrand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <pattern id="uiGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(148, 163, 184, 0.015)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#uiGrid)" />
  
  <circle cx="650" cy="250" r="180" fill="#3b82f6" opacity="0.03" filter="blur(50px)" />
  <circle cx="150" cy="380" r="150" fill="#10b981" opacity="0.02" filter="blur(45px)" />

  <g transform="translate(50, 45)" filter="url(#panelGlow)">
    <rect width="700" height="380" rx="16" fill="#111827" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1.5"/>
    
    <circle cx="24" cy="22" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="40" cy="22" r="5" fill="#f59e0b" opacity="0.7"/>
    <circle cx="56" cy="22" r="5" fill="#10b981" opacity="0.7"/>

    <g transform="translate(565, 15)">
      <circle cx="5" cy="6" r="4" fill="url(#fanBrand)" />
      <text x="14" y="10" font-family="-apple-system, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.04em">AERO_FLOW</text>
    </g>

    <g transform="translate(20, 64)">
      <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="-0.01em">Telemetry Deck</text>
      
      <rect y="24" width="126" height="24" rx="6" fill="rgba(16, 185, 129, 0.06)" stroke="rgba(16, 185, 129, 0.2)" stroke-width="1"/>
      <text x="12" y="39" font-family="monospace" font-size="9" font-weight="800" fill="#10b981" letter-spacing="0.02em">● OSCILLATING_</text>

      <g transform="translate(0, 64)">
        <rect width="126" height="42" rx="8" fill="#1e293b" opacity="0.5" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
        <text x="10" y="16" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#64748b" letter-spacing="0.05em">VELOCITY TIER</text>
        <text x="10" y="34" font-family="monospace" font-size="13" font-weight="800" fill="#3b82f6">Speed Tier 03</text>
      </g>

      <g transform="translate(0, 118)">
        <rect width="126" height="42" rx="8" fill="#1e293b" opacity="0.5" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
        <text x="10" y="16" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#64748b" letter-spacing="0.05em">ROTATIONAL FLUIDITY</text>
        <text x="10" y="34" font-family="monospace" font-size="13" font-weight="800" fill="#f8fafc">1,420 RPM</text>
      </g>

      <g transform="translate(0, 178)">
        <rect width="28" height="24" rx="4" fill="#1e293b" stroke="rgba(148, 163, 184, 0.1)"/>
        <text x="14" y="15" font-family="monospace" font-size="10" font-weight="800" fill="#94a3b8" text-anchor="middle">0</text>

        <rect x="33" y="0" width="28" height="24" rx="4" fill="#1e293b" stroke="rgba(148, 163, 184, 0.1)"/>
        <text x="47" y="15" font-family="monospace" font-size="10" font-weight="800" fill="#94a3b8" text-anchor="middle">1</text>

        <rect x="66" y="0" width="28" height="24" rx="4" fill="#1e293b" stroke="rgba(148, 163, 184, 0.1)"/>
        <text x="80" y="15" font-family="monospace" font-size="10" font-weight="800" fill="#94a3b8" text-anchor="middle">2</text>

        <rect x="99" y="0" width="28" height="24" rx="4" fill="rgba(59, 130, 246, 0.15)" stroke="#3b82f6" stroke-width="1.2"/>
        <text x="113" y="15" font-family="monospace" font-size="10" font-weight="900" fill="#3b82f6" text-anchor="middle">3</text>
      </g>
    </g>

    <line x1="162" y1="46" x2="162" y2="380" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>

    <g transform="translate(440, 195) rotate(15)">
      <path d="M -16 60 L 16 60 L 22 130 L -22 130 Z" fill="#1e293b" stroke="rgba(148, 163, 184, 0.1)" stroke-width="1"/>
      <ellipse cx="0" cy="130" rx="45" ry="12" fill="#0f172a" stroke="rgba(148, 163, 184, 0.1)" stroke-width="1"/>

      <circle cx="0" cy="0" r="105" fill="none" stroke="rgba(148, 163, 184, 0.04)" stroke-width="4"/>
      
      <circle cx="0" cy="0" r="95" fill="none" stroke="rgba(148, 163, 184, 0.06)" stroke-width="0.75"/>
      <circle cx="0" cy="0" r="70" fill="none" stroke="rgba(148, 163, 184, 0.06)" stroke-width="0.75"/>
      <circle cx="0" cy="0" r="45" fill="none" stroke="rgba(148, 163, 184, 0.06)" stroke-width="0.75"/>

      <line x1="0" y1="-95" x2="0" y2="95" stroke="rgba(148, 163, 184, 0.06)" stroke-width="0.75"/>
      <line x1="-95" y1="0" x2="95" y2="0" stroke="rgba(148, 163, 184, 0.06)" stroke-width="0.75"/>
      <line x1="-67" y1="-67" x2="67" y2="67" stroke="rgba(148, 163, 184, 0.06)" stroke-width="0.5"/>
      <line x1="-67" y1="67" x2="67" y2="-67" stroke="rgba(148, 163, 184, 0.06)" stroke-width="0.5"/>

      <g filter="url(#rotorGlow)" opacity="0.85">
        <path d="M 0 -12 C 35 -45, 45 -85, 10 -90 C -25 -95, -20 -45, 0 -12 Z" fill="url(#fanBrand)" />
        <path d="M 12 0 C 45 35, 85 45, 90 10 C 95 -25, 45 -20, 12 0 Z" fill="url(#fanBrand)" />
        <path d="M 0 12 C -35 45, -45 85, -10 90 C 25 95, 20 45, 0 12 Z" fill="url(#fanBrand)" />
        <path d="M -12 0 C -45 -35, -85 -45, -90 -10 C -95 25, -45 20, -12 0 Z" fill="url(#fanBrand)" />
      </g>

      <circle cx="0" cy="0" r="22" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
      <circle cx="0" cy="0" r="8" fill="#0f172a" />
    </g>
  </g>

  <g transform="translate(180, 440)">
    <rect width="440" height="42" rx="21" fill="rgba(4, 6, 11, 0.95)" stroke="rgba(148, 163, 184, 0.15)" stroke-width="1.5"/>
    
    <text x="28" y="26" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.06em">PHYSICS CORE SIMULATOR</text>
    <circle cx="188" cy="22" r="2" fill="#475569" />
    
    <text x="204" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#38bdf8">HTML5</text>
    <text x="254" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#10b981">CSS3</text>
    <text x="300" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#f59e0b">ES6+</text>
    
    <rect x="344" y="13" width="72" height="16" rx="4" fill="rgba(59, 130, 246, 0.08)" stroke="rgba(59, 130, 246, 0.15)" stroke-width="1"/>
    <text x="350" y="24" font-family="-apple-system, sans-serif" font-size="8" font-weight="800" fill="#3b82f6" letter-spacing="0.02em">INERTIA_RAF</text>
  </g>
</svg>
