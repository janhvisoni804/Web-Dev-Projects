<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anti To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Anti To-Do List</h1>
    <p>Record what you successfully avoided today!</p>

    <input type="text" id="avoidInput" placeholder="e.g. Scrolling Instagram">
    <button id="addBtn">Add Avoided Distraction</button>

    <ul id="avoidList"></ul>

    <p id="streak">Streak: 0 days</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
