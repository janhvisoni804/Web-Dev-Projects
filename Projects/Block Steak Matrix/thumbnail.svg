<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#03050a" />
      <stop offset="50%" stop-color="#080c16" />
      <stop offset="100%" stop-color="#111625" />
    </linearGradient>

    <filter id="panelGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.80"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#3b82f6" flood-opacity="0.02"/>
    </filter>

    <filter id="glassBlur" x="0%" y="0%" width="100%" height="100%">
      <feGaussianBlur stdDeviation="12" />
    </filter>

    <linearGradient id="blockCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>

    <linearGradient id="blockViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>

    <linearGradient id="blockOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>

    <filter id="cleanseGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <pattern id="matrixGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(148, 163, 184, 0.02)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#matrixGrid)" />
  
  <circle cx="650" cy="400" r="180" fill="#7c3aed" opacity="0.03" filter="blur(55px)" />
  <circle cx="150" cy="120" r="150" fill="#0ea5e9" opacity="0.02" filter="blur(40px)" />

  <g transform="translate(50, 45)" filter="url(#panelGlow)">
    <rect width="700" height="380" rx="16" fill="#0f172a" fill-opacity="0.4" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1.5"/>
    
    <circle cx="24" cy="22" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="40" cy="22" r="5" fill="#f59e0b" opacity="0.7"/>
    <circle cx="56" cy="22" r="5" fill="#10b981" opacity="0.7"/>

    <g transform="translate(550, 15)">
      <circle cx="5" cy="6" r="4" fill="#22d3ee" />
      <text x="14" y="10" font-family="-apple-system, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.04em">BLOCK_STACK // PRO</text>
    </g>

    <g transform="translate(20, 64)">
      <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="-0.01em">Telemetry HUD</text>
      
      <rect y="24" width="126" height="24" rx="6" fill="rgba(34, 211, 238, 0.05)" stroke="rgba(34, 211, 238, 0.2)" stroke-width="1"/>
      <text x="12" y="39" font-family="monospace" font-size="9" font-weight="800" fill="#22d3ee" letter-spacing="0.02em">VELOCITY: 1.2 Hz</text>

      <g transform="translate(0, 64)">
        <rect width="126" height="42" rx="8" fill="#1e293b" fill-opacity="0.6" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1"/>
        <text x="10" y="16" font-apple-system="sans-serif" font-size="8" font-weight="700" fill="#64748b" letter-spacing="0.05em">CORE SCORE</text>
        <text x="10" y="34" font-family="monospace" font-size="14" font-weight="800" fill="#f8fafc">14,250 PTS</text>
      </g>

      <g transform="translate(0, 118)">
        <rect width="126" height="42" rx="8" fill="#1e293b" fill-opacity="0.6" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1"/>
        <text x="10" y="16" font-apple-system="sans-serif" font-size="8" font-weight="700" fill="#64748b" letter-spacing="0.05em">CLEANSED LINES</text>
        <text x="10" y="34" font-family="monospace" font-size="14" font-weight="800" fill="#10b981">12 Drop Lines</text>
      </g>

      <rect y="184" width="126" height="32" rx="6" fill="#1e293b" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1"/>
      <text x="63" y="204" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#f8fafc" text-anchor="middle">Reset Matrix</text>
    </g>

    <line x1="162" y1="46" x2="162" y2="380" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1"/>

    <g transform="translate(295, 52)">
      <rect width="152" height="304" rx="8" fill="#0b1329" fill-opacity="0.5" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1.5"/>
      
      <line x1="30" y1="0" x2="30" y2="304" stroke="rgba(255, 255, 255, 0.02)" stroke-width="0.75"/>
      <line x1="60" y1="0" x2="60" y2="304" stroke="rgba(255, 255, 255, 0.02)" stroke-width="0.75"/>
      <line x1="90" y1="0" x2="90" y2="304" stroke="rgba(255, 255, 255, 0.02)" stroke-width="0.75"/>
      <line x1="120" y1="0" x2="120" y2="304" stroke="rgba(255, 255, 255, 0.02)" stroke-width="0.75"/>

      <g transform="translate(30, 46)">
        <rect width="28" height="28" rx="4" fill="url(#blockViolet)" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1"/>
        <rect x="30" y="0" width="28" height="28" rx="4" fill="url(#blockViolet)" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1"/>
        <rect x="60" y="0" width="28" height="28" rx="4" fill="url(#blockViolet)" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1"/>
        <rect x="30" y="30" width="28" height="28" rx="4" fill="url(#blockViolet)" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1"/>
      </g>

      <g transform="translate(1, 245)">
        <rect x="0" y="30" width="28" height="28" rx="4" fill="url(#blockCyan)" opacity="0.9"/>
        <rect x="30" y="30" width="28" height="28" rx="4" fill="url(#blockCyan)" opacity="0.9"/>
        <rect x="90" y="30" width="28" height="28" rx="4" fill="url(#blockOrange)" opacity="0.9"/>
        <rect x="120" y="30" width="28" height="28" rx="4" fill="url(#blockOrange)" opacity="0.9"/>

        <g filter="url(#cleanseGlow)">
          <rect x="0" y="0" width="28" height="28" rx="4" fill="#ffffff" stroke="#22d3ee" stroke-width="1.5"/>
          <rect x="30" y="0" width="28" height="28" rx="4" fill="#ffffff" stroke="#22d3ee" stroke-width="1.5"/>
          <rect x="60" y="0" width="28" height="28" rx="4" fill="#ffffff" stroke="#22d3ee" stroke-width="1.5"/>
          <rect x="90" y="0" width="28" height="28" rx="4" fill="#ffffff" stroke="#22d3ee" stroke-width="1.5"/>
          <rect x="120" y="0" width="28" height="28" rx="4" fill="#ffffff" stroke="#22d3ee" stroke-width="1.5"/>
        </g>
      </g>
    </g>

    <g transform="translate(544, 64)">
      <rect width="136" height="106" rx="10" fill="#1e293b" fill-opacity="0.3" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1"/>
      <text x="14" y="20" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#64748b" letter-spacing="0.05em">NEXT STRUCTURE</text>
      
      <g transform="translate(44, 38)">
        <rect width="22" height="22" rx="3" fill="url(#blockOrange)" />
        <rect x="24" y="0" width="22" height="22" rx="3" fill="url(#blockOrange)" />
        <rect y="24" width="22" height="22" rx="3" fill="url(#blockOrange)" />
        <rect x="24" y="24" width="22" height="22" rx="3" fill="url(#blockOrange)" />
      </g>
    </g>
  </g>

  <g transform="translate(180, 440)">
    <rect width="440" height="42" rx="21" fill="rgba(3, 5, 10, 0.95)" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1.5"/>
    
    <text x="28" y="26" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.06em">BLOCK-STACK CORE MATRIX</text>
    <circle cx="192" cy="22" r="2" fill="#475569" />
    
    <text x="208" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#38bdf8">HTML5</text>
    <text x="258" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#10b981">CSS3</text>
    <text x="304" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#f59e0b">ES6+</text>
    
    <rect x="348" y="13" width="68" height="16" rx="4" fill="rgba(34, 211, 238, 0.08)" stroke="rgba(34, 211, 238, 0.15)" stroke-width="1"/>
    <text x="354" y="24" font-family="-apple-system, sans-serif" font-size="8" font-weight="800" fill="#22d3ee" letter-spacing="0.02em">MATRIX_ROT</text>
  </g>
</svg>
