<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Friendship Letter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="letter" id="letter">
      <h2 id="friendName">Dear Bestie,</h2>
      <p id="message">You are the sparkle in my code ✨</p>
      <img id="sticker" src="assets/stickers/heart.png" alt="Sticker">
      <audio id="music" src="assets/music/friendship.mp3"></audio>
    </div>
  </div>
  <button id="openBtn">Open Letter</button>
  <button id="shareBtn">Share</button>
  <script src="script.js"></script>
</body>
</html>
