<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    
    <!-- Accent Color Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    
    <!-- Glassmorphic Card Shadow and Filters -->
    <filter id="glassBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background Rect -->
  <rect width="500" height="300" rx="20" fill="url(#bgGrad)"/>
  
  <!-- Subtle decorative grid background -->
  <path d="M 0,50 L 500,50 M 0,100 L 500,100 M 0,150 L 500,150 M 0,200 L 500,200 M 0,250 L 500,250" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <path d="M 50,0 L 50,300 M 100,0 L 100,300 M 150,0 L 150,300 M 200,0 L 200,300 M 250,0 L 250,300 M 300,0 L 300,300 M 350,0 L 350,300 M 400,0 L 400,300 M 450,0 L 450,300" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  
  <!-- Sidebar Panel Simulation -->
  <rect x="0" y="0" width="70" height="300" rx="20" fill="rgba(15, 23, 42, 0.4)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  
  <!-- Brand logo -->
  <rect x="20" y="20" width="30" height="30" rx="8" fill="url(#primaryGrad)"/>
  <text x="35" y="39" font-family="'Outfit', sans-serif" font-weight="900" font-size="16" fill="#ffffff" text-anchor="middle">C</text>
  
  <!-- Navigation Mock Indicators -->
  <circle cx="35" cy="90" r="10" fill="#6366f1"/>
  <circle cx="35" cy="130" r="10" fill="rgba(255,255,255,0.1)"/>
  <circle cx="35" cy="170" r="10" fill="rgba(255,255,255,0.1)"/>
  <circle cx="35" cy="210" r="10" fill="rgba(255,255,255,0.1)"/>
  <circle cx="35" cy="250" r="10" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Dashboard Heading -->
  <text x="90" y="42" font-family="'Outfit', sans-serif" font-weight="800" font-size="20" fill="#ffffff">Command Center</text>
  <text x="90" y="58" font-family="'Inter', sans-serif" font-weight="500" font-size="10" fill="#94a3b8">Centralized productivity analytics &amp; tools</text>
  
  <!-- Top level clock and date mock -->
  <rect x="360" y="20" width="120" height="40" rx="10" fill="rgba(255, 255, 255, 0.05)" stroke="rgba(255,255,255,0.05)"/>
  <text x="420" y="38" font-family="'Outfit', sans-serif" font-weight="700" font-size="14" fill="#06b6d4" text-anchor="middle">09:42 AM</text>
  <text x="420" y="52" font-family="'Inter', sans-serif" font-weight="600" font-size="8" fill="#94a3b8" text-anchor="middle">June 6, 2026</text>

  <!-- Widgets / Cards Grid -->
  
  <!-- 1. Stats Card (Completed tasks) -->
  <rect x="90" y="80" width="120" height="90" rx="12" fill="rgba(30, 41, 59, 0.45)" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <text x="110" y="115" font-family="'Outfit', sans-serif" font-weight="800" font-size="24" fill="#ffffff">5 / 8</text>
  <text x="110" y="130" font-family="'Inter', sans-serif" font-weight="500" font-size="9" fill="#94a3b8">Tasks Done</text>
  <rect x="110" y="145" width="80" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
  <rect x="110" y="145" width="50" height="4" rx="2" fill="url(#primaryGrad)"/>
  
  <!-- 2. Pomodoro Timer Circle Card -->
  <rect x="225" y="80" width="125" height="90" rx="12" fill="rgba(30, 41, 59, 0.45)" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <circle cx="287" cy="125" r="28" stroke="rgba(255,255,255,0.1)" stroke-width="3" fill="none"/>
  <path d="M 287,97 A 28,28 0 1,1 259,125" fill="none" stroke="url(#secondaryGrad)" stroke-width="3" stroke-linecap="round"/>
  <text x="287" y="129" font-family="'Outfit', sans-serif" font-weight="700" font-size="11" fill="#ffffff" text-anchor="middle">18:24</text>
  <text x="287" y="162" font-family="'Inter', sans-serif" font-weight="600" font-size="8" fill="#06b6d4" text-anchor="middle">Focus Session</text>
  
  <!-- 3. Habits Streak Tracker Card -->
  <rect x="365" y="80" width="115" height="90" rx="12" fill="rgba(30, 41, 59, 0.45)" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <text x="385" y="115" font-family="'Outfit', sans-serif" font-weight="800" font-size="24" fill="#ffffff">12</text>
  <text x="385" y="130" font-family="'Inter', sans-serif" font-weight="500" font-size="9" fill="#94a3b8">Streak Day</text>
  <circle cx="390" cy="148" r="6" fill="#10b981"/>
  <circle cx="406" cy="148" r="6" fill="#10b981"/>
  <circle cx="422" cy="148" r="6" fill="#10b981"/>
  <circle cx="438" cy="148" r="6" fill="rgba(255,255,255,0.1)"/>
  
  <!-- 4. Line Chart / Analytics Card (Bottom) -->
  <rect x="90" y="185" width="390" height="95" rx="12" fill="rgba(30, 41, 59, 0.45)" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <text x="110" y="208" font-family="'Outfit', sans-serif" font-weight="700" font-size="11" fill="#ffffff">Productivity Trends</text>
  
  <!-- Line chart simulation paths -->
  <path d="M 110,255 L 150,250 L 190,230 L 230,245 L 270,220 L 310,235 L 350,215 L 390,225 L 430,205 L 470,215" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
  
  <!-- Main filled area gradient -->
  <path d="M 110,255 L 150,240 L 190,215 L 230,235 L 270,200 L 310,220 L 350,195 L 390,210 L 430,190 L 470,200 L 470,265 L 110,265 Z" fill="rgba(99, 102, 241, 0.08)" stroke="none"/>
  
  <!-- Stroke line path -->
  <path d="M 110,255 L 150,240 L 190,215 L 230,235 L 270,200 L 310,220 L 350,195 L 390,210 L 430,190 L 470,200" fill="none" stroke="url(#primaryGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Glowing circles on graph -->
  <circle cx="270" cy="200" r="3" fill="#6366f1"/>
  <circle cx="350" cy="195" r="3" fill="#6366f1"/>
  <circle cx="430" cy="190" r="3" fill="#06b6d4"/>
</svg>
