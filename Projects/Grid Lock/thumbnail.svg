        <text x="144" y="197" font-family="monospace" font-size="16" font-weight="800" fill="#94a3b8" text-anchor="middle">5</text>
        <rect x="180" y="168" width="48" height="48" rx="8" fill="#1f2937" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>
