<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="100%" stop-color="#18181b" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Felt borders -->
  <rect x="25" y="25" width="750" height="450" rx="16" fill="none" stroke="#10b981" stroke-opacity="0.15" stroke-width="2" />

  <!-- Left: Activity Rings (Isometric/flat representation) -->
  <g transform="translate(240, 250)">
    <!-- Outer Ring (Active Calories) -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#1f2937" stroke-width="18" />
    <circle cx="0" cy="0" r="110" fill="none" stroke="#10b981" stroke-width="18" stroke-dasharray="690" stroke-dashoffset="150" stroke-linecap="round" filter="url(#glow)" />

    <!-- Middle Ring (Active Minutes) -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#1f2937" stroke-width="18" />
    <circle cx="0" cy="0" r="80" fill="none" stroke="#34d399" stroke-width="18" stroke-dasharray="500" stroke-dashoffset="200" stroke-linecap="round" />

    <!-- Inner Ring (Water Intake) -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="#1f2937" stroke-width="18" />
    <circle cx="0" cy="0" r="50" fill="none" stroke="#60a5fa" stroke-width="18" stroke-dasharray="310" stroke-dashoffset="80" stroke-linecap="round" />
  </g>

  <!-- Right: Line Trend Graph -->
  <g transform="translate(460, 150)">
    <!-- Graph Card Box -->
    <rect width="280" height="200" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1.5" />
    
    <!-- Title -->
    <text x="20" y="30" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="14" font-weight="700" fill="#fafafa">Weight Trend</text>
    <text x="260" y="30" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="12" font-weight="600" fill="#10b981" text-anchor="end">-2.4 kg</text>

    <!-- Grid lines -->
    <line x1="20" y1="70" x2="260" y2="70" stroke="#27272a" stroke-dasharray="4 4" />
    <line x1="20" y1="120" x2="260" y2="120" stroke="#27272a" stroke-dasharray="4 4" />
    <line x1="20" y1="170" x2="260" y2="170" stroke="#27272a" />

    <!-- Trend line path -->
    <path d="M 30,140 Q 70,80 110,110 T 190,70 T 250,90" fill="none" stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round" filter="url(#glow)" />
    
    <!-- Accent Dots -->
    <circle cx="110" cy="110" r="5" fill="#fafafa" stroke="#10b981" stroke-width="2" />
    <circle cx="190" cy="70" r="5" fill="#fafafa" stroke="#10b981" stroke-width="2" />
  </g>

  <!-- Text Bottom -->
  <text x="400" y="440" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="28" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="4" filter="url(#glow)">FITNESS TRACKER</text>
</svg>
