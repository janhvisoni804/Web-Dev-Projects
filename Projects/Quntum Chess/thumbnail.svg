<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Deep Space Space Theme Base Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030509" />
      <stop offset="50%" stop-color="#070a14" />
      <stop offset="100%" stop-color="#0b1120" />
    </linearGradient>

    <!-- UI Panel Drop Shadows -->
    <filter id="panelGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.85"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#06b6d4" flood-opacity="0.03"/>
    </filter>

    <!-- Superposition Entanglement Pulse Shader Glow -->
    <filter id="quantumGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Cyberpunk Quantum Brand Gradient Paths -->
    <linearGradient id="quantumBrand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <!-- Technical UI Grid Layout Pattern Overlay -->
    <pattern id="uiGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(148, 163, 184, 0.02)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- BACKGROUND BASELAYERS -->
  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#uiGrid)" />
  
  <!-- Ambient Backlight Vectors -->
  <circle cx="620" cy="360" r="190" fill="#6366f1" opacity="0.02" filter="blur(55px)" />
  <circle cx="420" cy="120" r="160" fill="#06b6d4" opacity="0.03" filter="blur(40px)" />

  <!-- ====================================================================
       QUANTUM CHESS MAIN WIREFRAME APPLICATION WINDOW
       ==================================================================== -->
  <g transform="translate(50, 45)" filter="url(#panelGlow)">
    <!-- Main Window Outer Framework Chassis -->
    <rect width="700" height="380" rx="16" fill="#0f172a" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1.5"/>
    
    <!-- OS Control Points Window Chrome -->
    <circle cx="24" cy="22" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="40" cy="22" r="5" fill="#f59e0b" opacity="0.7"/>
    <circle cx="56" cy="22" r="5" fill="#10b981" opacity="0.7"/>

    <!-- App Identity Top Right Flag -->
    <g transform="translate(555, 15)">
      <circle cx="5" cy="6" r="4" fill="url(#quantumBrand)" />
      <text x="14" y="10" font-family="-apple-system, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.05em">QUANTUM_CHESS</text>
    </g>

    <!-- ==================================================================
         COLUMN 1: LEFT SIDEBAR PARAMETERS & WAVEFUNCTION HUD LOGS
         ================================================================== -->
    <g transform="translate(20, 64)">
      <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="-0.01em">Observer HUD</text>
      
      <!-- Current Active Turn Tracking Badge -->
      <rect y="24" width="126" height="24" rx="6" fill="rgba(6, 182, 212, 0.06)" stroke="rgba(6, 182, 212, 0.2)" stroke-width="1"/>
      <text x="12" y="39" font-family="monospace" font-size="10" font-weight="800" fill="#06b6d4" letter-spacing="0.02em">TURN: WHITE</text>

      <!-- Quantum Core Real-Time State Indicator Logs -->
      <g transform="translate(0, 64)">
        <rect width="126" height="54" rx="8" fill="#1e293b" opacity="0.5" stroke="rgba(148, 163, 184, 0.06)" stroke-width="1"/>
        <text x="10" y="16" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#64748b" letter-spacing="0.05em">QUANTUM STATUS</text>
        <text x="10" y="32" font-family="monospace" font-size="11" font-weight="800" fill="#a855f7">ψ-SUPERPOSITION</text>
        <text x="10" y="46" font-family="monospace" font-size="8" font-weight="700" fill="#94a3b8">Knight split at (b1, c3)</text>
      </g>

      <g transform="translate(0, 130)">
        <rect width="126" height="42" rx="8" fill="#1e293b" opacity="0.5" stroke="rgba(148, 163, 184, 0.06)" stroke-width="1"/>
        <text x="10" y="16" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#64748b" letter-spacing="0.05em">GAME MATRIX</text>
        <text x="10" y="34" font-family="monospace" font-size="12" font-weight="800" fill="#10b981">State: Active</text>
      </g>

      <!-- Primary Resonator Simulation Interrupter Trigger (Reset Button) -->
      <rect y="190" width="126" height="28" rx="6" fill="#1e293b" stroke="rgba(148, 163, 184, 0.1)" stroke-width="1"/>
      <text x="63" y="207" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="#f8fafc" text-anchor="middle">Collapse Matrix</text>
    </g>

    <!-- Vertical Splitter Layout Column Line 1 -->
    <line x1="162" y1="46" x2="162" y2="380" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>

    <!-- ==================================================================
         COLUMN 2: CENTRAL INTERACTIVE FUTURISTIC 4x4 MATRIX BOARD
         ================================================================== -->
    <g transform="translate(320, 70)">
      <!-- 4x4 Coordinate Matrix Mesh Block Grid Layout -->
      
      <!-- ROW 1 INDICES -->
      <rect width="56" height="56" rx="4" fill="#1e293b" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
      <text x="28" y="36" font-family="serif" font-size="28" font-weight="700" fill="#64748b" text-anchor="middle">♜</text>
      
      <rect x="60" y="0" width="56" height="56" rx="4" fill="#334155" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
      <text x="88" y="36" font-family="serif" font-size="28" font-weight="700" fill="#64748b" text-anchor="middle">♞</text>
      
      <rect x="120" y="0" width="56" height="56" rx="4" fill="#1e293b" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
      <text x="148" y="36" font-family="serif" font-size="28" font-weight="700" fill="#64748b" text-anchor="middle">♚</text>
      
      <rect x="180" y="0" width="56" height="56" rx="4" fill="#334155" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
      <text x="208" y="36" font-family="serif" font-size="28" font-weight="700" fill="#64748b" text-anchor="middle">♟</text>

      <!-- ROW 2 INDICES -->
      <rect y="60" width="56" height="56" rx="4" fill="#334155" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
      <rect x="60" y="60" width="56" height="56" rx="4" fill="#1e293b" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
      <rect x="120" y="60" width="56" height="56" rx="4" fill="#334155" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
      <rect x="180" y="60" width="56" height="56" rx="4" fill="#1e293b" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>

      <!-- ROW 3 INDICES (Demonstrating Quantum Entanglement Superposition Split State) -->
      <rect y="120" width="56" height="56" rx="4" fill="#1e293b" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
      
      <!-- Split Target Node Reality A (Pulsing Cyan glow highlight) -->
      <g transform="translate(60, 120)" filter="url(#quantumGlow)">
        <rect width="56" height="56" rx="4" fill="rgba(6, 182, 212, 0.12)" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="3 3"/>
        <text x="28" y="36" font-family="serif" font-size="28" font-weight="700" fill="#06b6d4" opacity="0.4" text-anchor="middle">♘</text>
      </g>
      
      <rect x="120" y="120" width="56" height="56" rx="4" fill="#1e293b" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
      
      <!-- Split Target Node Reality B (Pulsing Cyan glow highlight) -->
      <g transform="translate(180, 120)" filter="url(#quantumGlow)">
        <rect width="56" height="56" rx="4" fill="rgba(6, 182, 212, 0.12)" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="3 3"/>
        <text x="28" y="36" font-family="serif" font-size="28" font-weight="700" fill="#06b6d4" opacity="0.4" text-anchor="middle">♘</text>
      </g>

      <!-- ROW 4 INDICES -->
      <rect y="180" width="56" height="56" rx="4" fill="#334155" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
      <text x="28" y="216" font-family="serif" font-size="28" font-weight="700" fill="#f8fafc" text-anchor="middle">♙</text>
      
      <rect x="60" y="180" width="56" height="56" rx="4" fill="#1e293b" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
      
      <rect x="120" y="180" width="56" height="56" rx="4" fill="#334155" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
      <text x="148" y="216" font-family="serif" font-size="28" font-weight="700" fill="#f8fafc" text-anchor="middle">♔</text>
      
      <rect x="180" y="180" width="56" height="56" rx="4" fill="#1e293b" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
      <text x="208" y="216" font-family="serif" font-size="28" font-weight="700" fill="#f8fafc" text-anchor="middle">♖</text>
    </g>
  </g>

  <!-- ====================================================================
       FOOTER PIPELINE FRAMEWORK TECHNICAL MANIFEST META MODULE CAPSULE
       ==================================================================== -->
  <g transform="translate(180, 440)">
    <rect width="440" height="42" rx="21" fill="rgba(4, 6, 11, 0.95)" stroke="rgba(148, 163, 184, 0.15)" stroke-width="1.5"/>
    
    <text x="28" y="26" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.06em">QUANTUM MICROCHESS VARIANT</text>
    <circle cx="198" cy="22" r="2" fill="#475569" />
    
    <!-- Code Language Tech Badges -->
    <text x="214" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#38bdf8">HTML5</text>
    <text x="264" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#10b981">CSS3</text>
    <text x="310" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#f59e0b">ES6+</text>
    
    <!-- Algorithmic Paradigm Specification Tag -->
    <rect x="354" y="13" width="62" height="16" rx="4" fill="rgba(6, 182, 212, 0.08)" stroke="rgba(6, 182, 212, 0.15)" stroke-width="1"/>
    <text x="360" y="24" font-family="-apple-system, sans-serif" font-size="8" font-weight="800" fill="#06b6d4" letter-spacing="0.02em">WAVE_FN</text>
  </g>
</svg>
