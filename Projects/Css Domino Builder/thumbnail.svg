<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1128" />
      <stop offset="50%" stop-color="#101f42" />
      <stop offset="100%" stop-color="#1c3366" />
    </linearGradient>

    <filter id="panelGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.80"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#38bdf8" flood-opacity="0.03"/>
    </filter>

    <linearGradient id="dominoCyan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>

    <linearGradient id="dominoOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#c2410c" />
    </linearGradient>

    <filter id="cascadeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <pattern id="blueprintGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(56, 189, 248, 0.06)" stroke-width="1"/>
      <path d="M 150 0 L 0 0 0 150" fill="none" stroke="rgba(56, 189, 248, 0.12)" stroke-width="1.5"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#blueprintGrid)" />
  
  <circle cx="680" cy="400" r="180" fill="#f43f5e" opacity="0.02" filter="blur(55px)" />
  <circle cx="200" cy="150" r="220" fill="#38bdf8" opacity="0.03" filter="blur(50px)" />

  <g transform="translate(50, 45)" filter="url(#panelGlow)">
    <rect width="700" height="380" rx="16" fill="#0b1329" fill-opacity="0.7" stroke="rgba(56, 189, 248, 0.12)" stroke-width="1.5"/>
    
    <circle cx="24" cy="22" r="5" fill="#f43f5e" opacity="0.7"/>
    <circle cx="40" cy="22" r="5" fill="#fb923c" opacity="0.7"/>
    <circle cx="56" cy="22" r="5" fill="#10b981" opacity="0.7"/>

    <g transform="translate(560, 15)">
      <circle cx="5" cy="6" r="4" fill="#38bdf8" />
      <text x="14" y="10" font-family="monospace" font-size="11" font-weight="900" fill="#f8fafc" letter-spacing="0.05em">DOMINO_TRANSFORM</text>
    </g>

    <g transform="translate(20, 64)">
      <text x="0" y="14" font-family="monospace" font-size="13" font-weight="900" fill="#ffffff" letter-spacing="-0.01em">CONTROL_DECK</text>
      
      <rect y="24" width="126" height="24" rx="6" fill="rgba(56, 189, 248, 0.05)" stroke="rgba(56, 189, 248, 0.2)" stroke-width="1"/>
      <text x="12" y="39" font-family="monospace" font-size="9" font-weight="900" fill="#38bdf8" letter-spacing="0.02em">MODE: PLACE_MODE</text>

      <g transform="translate(0, 64)">
        <rect width="126" height="42" rx="8" fill="#111827" fill-opacity="0.6" stroke="rgba(56, 189, 248, 0.04)" stroke-width="1"/>
        <text x="10" y="16" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="0.05em">VECTOR DIRECTION</text>
        <text x="10" y="34" font-family="monospace" font-size="13" font-weight="900" fill="#fb923c">➡️ RIGHT [X+]</text>
      </g>

      <g transform="translate(0, 124)">
        <rect width="126" height="34" rx="8" fill="rgba(16, 185, 129, 0.12)" stroke="#10b981" stroke-width="1.5"/>
        <text x="63" y="21" font-family="monospace" font-size="10" font-weight="900" fill="#10b981" text-anchor="middle">TRIGGER RUN ▶</text>
      </g>

      <g transform="translate(0, 172)">
        <rect width="126" height="32" rx="6" fill="#111827" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>
        <text x="63" y="19" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#94a3b8" text-anchor="middle">Reset Workspace</text>
      </g>
    </g>

    <line x1="162" y1="46" x2="162" y2="380" stroke="rgba(56, 189, 248, 0.08)" stroke-width="1"/>

    <g transform="translate(192, 52)">
      <text x="10" y="24" font-family="monospace" font-size="11" font-weight="800" fill="#64748b" letter-spacing="0.02em">&gt;_ SIMULATION_SPACE / MATRIX_GRID</text>
      
      <g transform="translate(30, 60)">
        <g transform="translate(40, 60)">
          <rect x="4" y="-4" width="16" height="42" rx="2" fill="#0369a1" />
          <rect width="16" height="42" rx="2" fill="url(#dominoCyan)" stroke="rgba(255,255,255,0.2)" stroke-width="0.75"/>
          <line x1="2" y1="21" x2="14" y2="21" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
          <circle cx="8" cy="10" r="1.5" fill="#ffffff"/>
          <circle cx="8" cy="32" r="1.5" fill="#ffffff"/>
        </g>

        <g transform="translate(100, 60) rotate(25)">
          <rect x="3" y="-3" width="16" height="42" rx="2" fill="#0369a1" />
          <rect width="16" height="42" rx="2" fill="url(#dominoCyan)" stroke="rgba(255,255,255,0.2)" stroke-width="0.75"/>
          <line x1="2" y1="21" x2="14" y2="21" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
          <circle cx="8" cy="10" r="1.5" fill="#ffffff"/>
          <circle cx="8" cy="32" r="1.5" fill="#ffffff"/>
        </g>

        <g transform="translate(160, 60) rotate(55)" filter="url(#cascadeGlow)">
          <rect x="2" y="-2" width="16" height="42" rx="2" fill="#c2410c" />
          <rect width="16" height="42" rx="2" fill="url(#dominoOrange)" stroke="rgba(255,255,255,0.2)" stroke-width="0.75"/>
          <line x1="2" y1="21" x2="14" y2="21" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
          <circle cx="8" cy="10" r="1.5" fill="#ffffff"/>
          <circle cx="8" cy="32" r="1.5" fill="#ffffff"/>
        </g>
        
        <g transform="translate(224, 82) rotate(82)">
          <rect width="16" height="42" rx="2" fill="url(#dominoOrange)" stroke="rgba(255,255,255,0.1)" stroke-width="0.75"/>
        </g>
      </g>
    </g>
  </g>

  <g transform="translate(180, 440)">
    <rect width="440" height="42" rx="21" fill="rgba(11, 19, 41, 0.95)" stroke="rgba(56, 189, 248, 0.2)" stroke-width="1.5"/>
    
    <text x="28" y="26" font-family="monospace" font-size="11" font-weight="900" fill="#f8fafc" letter-spacing="0.06em">3D_CSS CASCADING RUNNER</text>
    <circle cx="212" cy="22" r="2" fill="#475569" />
    
    <text x="228" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#38bdf8">HTML5</text>
    <text x="278" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#10b981">CSS3</text>
    <text x="324" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#f59e0b">ES6+</text>
    
    <rect x="366" y="13" width="50" height="16" rx="4" fill="rgba(56, 189, 248, 0.08)" stroke="rgba(56, 189, 248, 0.15)" stroke-width="1"/>
    <text x="391" y="24" font-family="monospace" font-size="8" font-weight="900" fill="#38bdf8" text-anchor="middle">3D_XFRM</text>
  </g>
</svg>
