      <rect x="104" y="52" width="44" height="44" rx="4" fill="#090d16" stroke="rgba(148, 163, 184, 0.03)" stroke-width="1"/>
      <text x="126" y="80" font-family="monospace" font-size="14" font-weight="700" fill="#334155" text-anchor="middle">0</text>
      
      <rect x="156" y="52" width="44" height="44" rx="4" fill="rgba(56, 189, 248, 0.05)" stroke="rgba(56, 189, 248, 0.2)" stroke-width="1"/>
      <text x="178" y="80" font-family="monospace" font-size="14" font-weight="800" fill="#38bdf8" text-anchor="middle">3</text>

      <rect y="104" width="44" height="44" rx="4" fill="#090d16" stroke="rgba(148, 163, 184, 0.03)" stroke-width="1"/>
      <text x="22" y="132" font-family="monospace" font-size="14" font-weight="700" fill="#334155" text-anchor="middle">0</text>
      
      <rect x="52" y="104" width="44" height="44" rx="4" fill="#090d16" stroke="rgba(148, 163, 184, 0.03)" stroke-width="1"/>
      <text x="74" y="132" font-family="monospace" font-size="14" font-weight="700" fill="#334155" text-anchor="middle">0</text>
      
      <rect x="104" y="104" width="44" height="44" rx="4" fill="rgba(168, 85, 247, 0.05)" stroke="rgba(168, 85, 247, 0.2)" stroke-width="1"/>
      <text x="126" y="132" font-family="monospace" font-size="14" font-weight="800" fill="#a855f7" text-anchor="middle">1</text>
      
      <rect x="156" y="104" width="44" height="44" rx="4" fill="#1f2937" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>

      <rect y="156" width="44" height="44" rx="4" fill="#1f2937" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>
      <rect x="52" y="156" width="44" height="44" rx="4" fill="#1f2937" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>
      <rect x="104" y="156" width="44" height="44" rx="4" fill="#1f2937" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>
      <rect x="156" y="156" width="44" height="44" rx="4" fill="#1f2937" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>
