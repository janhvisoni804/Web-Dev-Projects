      <text x="178" y="28" font-family="monospace" font-size="14" font-weight="800" fill="#f59e0b" text-anchor="middle">2</text>

      <rect y="52" width="44" height="44" rx="4" fill="rgba(168, 85, 247, 0.05)" stroke="rgba(168, 85, 247, 0.2)" stroke-width="1"/>
      <text x="22" y="80" font-family="monospace" font-size="14" font-weight="800" fill="#a855f7" text-anchor="middle">1</text>
      
      <g transform="translate(52, 52)">
