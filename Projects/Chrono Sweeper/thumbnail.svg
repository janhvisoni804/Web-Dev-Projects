        <text x="10" y="34" font-family="monospace" font-size="13" font-weight="800" fill="#10b981">64 / 256 Cells</text>
      </g>

      <g transform="translate(0, 122)">
        <rect width="126" height="42" rx="8" fill="#1f2937" opacity="0.5" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
        <text x="10" y="16" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="0.05em">THREAT THRESHOLD</text>
