<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040508" />
      <stop offset="50%" stop-color="#070a12" />
      <stop offset="100%" stop-color="#0e1424" />
    </linearGradient>

    <filter id="panelGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.85"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#ff0055" flood-opacity="0.03"/>
    </filter>

    <filter id="chronoGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="chronoBrand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0055" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <pattern id="uiGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(245, 158, 11, 0.02)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#uiGrid)" />
  
  <circle cx="700" cy="380" r="180" fill="#f59e0b" opacity="0.02" filter="blur(50px)" />
  <circle cx="120" cy="120" r="200" fill="#ff0055" opacity="0.02" filter="blur(60px)" />

  <g transform="translate(50, 45)" filter="url(#panelGlow)">
    <rect width="700" height="380" rx="16" fill="#111827" stroke="rgba(245, 158, 11, 0.08)" stroke-width="1.5"/>
    
    <circle cx="24" cy="22" r="5" fill="#ff0055" opacity="0.7"/>
    <circle cx="40" cy="22" r="5" fill="#f59e0b" opacity="0.7"/>
    <circle cx="56" cy="22" r="5" fill="#10b981" opacity="0.7"/>

    <g transform="translate(535, 15)">
      <circle cx="5" cy="6" r="4" fill="url(#chronoBrand)" />
      <text x="14" y="10" font-family="-apple-system, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.05em">CHRONO_SWEEPER_v2</text>
    </g>

    <g transform="translate(20, 64)">
      <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="-0.01em">Vector Logistics</text>
      
      <g filter="url(#chronoGlow)">
        <rect y="24" width="126" height="26" rx="6" fill="rgba(255, 0, 85, 0.1)" stroke="#ff0055" stroke-width="1"/>
        <text x="12" y="41" font-family="monospace" font-size="10" font-weight="900" fill="#ff0055" letter-spacing="0.02em">INTERVAL: 3.4s</text>
      </g>

      <g transform="translate(0, 68)">
        <rect width="126" height="42" rx="8" fill="#1f2937" opacity="0.5" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
