      <text x="22" y="28" font-family="monospace" font-size="14" font-weight="800" fill="#a855f7" text-anchor="middle">1</text>
      
      <rect x="52" y="0" width="44" height="44" rx="4" fill="#1f2937" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>
      
