  <g transform="translate(180, 440)">
    <rect width="440" height="42" rx="21" fill="rgba(4, 5, 8, 0.95)" stroke="rgba(245, 158, 11, 0.15)" stroke-width="1.5"/>
    
    <text x="28" y="26" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.06em">PROXIMITY VECTOR MATRIX</text>
    <circle cx="196" cy="22" r="2" fill="#475569" />
    
    <text x="212" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#38bdf8">HTML5</text>
    <text x="262" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#10b981">CSS3</text>
    <text x="308" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#f59e0b">ES6+</text>
    
    <rect x="352" y="13" width="64" height="16" rx="4" fill="rgba(255, 0, 85, 0.08)" stroke="rgba(255, 0, 85, 0.15)" stroke-width="1"/>
    <text x="358" y="24" font-family="-apple-system, sans-serif" font-size="8" font-weight="800" fill="#ff0055" letter-spacing="0.02em">FLOOD_FILL</text>
