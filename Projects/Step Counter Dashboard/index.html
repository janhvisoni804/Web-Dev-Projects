<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Step Counter Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header id="teleBar">
    <div class="tile"><span class="tile-lbl">Total Steps</span><span class="tile-val cy" id="tileSteps">0</span></div>
    <div class="tile"><span class="tile-lbl">Distance</span><span class="tile-val gr" id="tileDist">0 km</span></div>
    <div class="tile"><span class="tile-lbl">Calories</span><span class="tile-val gr" id="tileCal">0 kcal</span></div>
    <div class="tile"><span class="tile-lbl">Completion</span><span class="tile-val" id="tilePct">0%</span></div>
  </header>

  <div id="deck">
    <section id="formPanel">
      <h2 class="pnl-hd">Log Daily Steps</h2>
      <div class="ctrl"><label>Date</label><input type="date" id="fDate"></div>
      <div class="ctrl"><label>Steps Taken</label><input type="number" id="fSteps" min="1" step="1" placeholder="e.g. 8500"></div>
      <div class="ctrl"><label>Daily Goal</label><input type="number" id="fGoal" min="1" step="1" value="10000" placeholder="e.g. 10000"></div>
      <button id="logBtn">Log Entry</button>
    </section>

    <section id="chartPanel">
      <h2 class="pnl-hd">Progression</h2>
      <div id="canvasWrap"><canvas id="ringCanvas"></canvas></div>
      <div id="chartKey"></div>
    </section>

    <section id="ledgerPanel">
      <div id="ledgerHd"><h2 class="pnl-hd">Activity Log</h2><span id="ledgerCount"></span></div>
      <div id="ledgerWrap">
        <table id="ledgerTable">
          <thead><tr><th>Date</th><th>Steps</th><th>Goal</th><th>Status</th></tr></thead>
          <tbody id="ledgerBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <footer id="footBar">
    <button id="clearBtn">Clear Activity Logs</button>
    <button id="seedBtn">Load Sample Data</button>
  </footer>
</div>
<script src="script.js"></script>
</body>
</html>
