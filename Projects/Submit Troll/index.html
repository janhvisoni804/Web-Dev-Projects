<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submit Troll</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="troll-container">
    <h1>🕹️ Submit Troll</h1>
    <p>Try to click <strong>"Yes"</strong> if you can 👀</p>

    <div class="buttons">
      <button id="yesBtn">Yes</button>
      <button id="noBtn">No</button>
    </div>

    <div class="controls">
      <label for="difficulty">Difficulty:</label>
      <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
    </div>

    <div class="stats">
      <p>Attempts: <span id="attempts">0</span></p>
      <p>Catches: <span id="catches">0</span></p>
      <p>Escapes: <span id="escapes">0</span></p>
    </div>
  </div>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>
